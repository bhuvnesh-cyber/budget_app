<!DOCTYPE html>
<html lang="en">
<head>

<title>Budget</title>

<style>
:root{
  --bg:#F0F4FF;
  --s1:#FFFFFF;--s2:#F5F7FF;--s3:#EBF0FF;
  --bd:#DDE3F5;--bd2:#C8D2EE;
  --tx:#0F1523;--m1:#4A5270;--m2:#8890AA;
  --acc:#4F46E5;--acc-bg:#EEF2FF;--acc-bd:#C7D2FE;--acc-lt:#818CF8;
  --red:#DC2626;--red-bg:#FEF2F2;--red-bd:#FECACA;
  --grn:#059669;--grn-bg:#ECFDF5;--grn-bd:#A7F3D0;
  --amb:#D97706;--amb-bg:#FFFBEB;--amb-bd:#FDE68A;
  --blu:#2563EB;--blu-bg:#EFF6FF;--blu-bd:#BFDBFE;
  --pur:#7C3AED;--pur-bg:#F5F3FF;--pur-bd:#DDD6FE;
  --pnk:#DB2777;--pnk-bg:#FDF2F8;--pnk-bd:#FBCFE8;
  --nav-h:64px;--safe-b:env(safe-area-inset-bottom,0px);
  --r:16px;--rs:10px;
  --mono:'JetBrains Mono',monospace;
  --sans:'Plus Jakarta Sans',sans-serif;
  --sh:0 1px 4px rgba(79,70,229,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 8px 24px rgba(79,70,229,.12),0 2px 6px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);overflow-x:hidden;font-size:15px}
#root{display:flex;flex-direction:column;min-height:100%}
.page{flex:1;padding:.75rem 1rem calc(var(--nav-h) + var(--safe-b) + 1.5rem);max-width:520px;margin:0 auto;width:100%}

.nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));
  background:rgba(255,255,255,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--bd);display:flex;align-items:stretch;z-index:100;padding-bottom:var(--safe-b);
  box-shadow:0 -4px 20px rgba(79,70,229,.08)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:none;cursor:pointer;color:var(--m2);font-family:var(--sans);
  font-size:.5rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;transition:color .15s}
.nb.on{color:var(--acc)}
.nb svg{width:20px;height:20px;stroke-width:1.8;fill:none;stroke:currentColor}
.nb-dot{width:4px;height:4px;border-radius:50%;background:var(--acc);margin-top:-1px;display:none}
.nb.on .nb-dot{display:block}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.9rem 1rem;box-shadow:var(--sh)}
.card+.card{margin-top:.5rem}

.sh{font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);
  font-weight:800;margin:1.4rem 0 .6rem;display:flex;align-items:center;gap:.6rem}
.sh::after{content:'';flex:1;height:1px;background:var(--acc-bd)}

.sl{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--m2);font-weight:700;margin-bottom:5px}
.sv{font-size:1.4rem;font-weight:800;line-height:1;font-family:var(--mono);letter-spacing:-.02em}
.ss{font-size:.66rem;color:var(--m1);margin-top:4px;font-family:var(--mono)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.5rem}

.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;
  font-size:.6rem;font-weight:700;border:1px solid transparent;white-space:nowrap;font-family:var(--sans)}
.pill.gd{background:var(--grn-bg);border-color:var(--grn-bd);color:var(--grn)}
.pill.wn{background:var(--amb-bg);border-color:var(--amb-bd);color:var(--amb)}
.pill.bd{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.pill.inf{background:var(--blu-bg);border-color:var(--blu-bd);color:var(--blu)}
.pill.ac{background:var(--pur-bg);border-color:var(--pur-bd);color:var(--pur)}
.pill.pk{background:var(--pnk-bg);border-color:var(--pnk-bd);color:var(--pnk)}
.pill-row{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem}

.note{display:flex;align-items:center;gap:8px;padding:.45rem .8rem;border-radius:10px;
  font-size:.72rem;font-weight:600;margin-bottom:.5rem;border-left:3px solid}
.note.gd{background:var(--grn-bg);border-color:var(--grn);color:var(--grn)}
.note.wn{background:var(--amb-bg);border-color:var(--amb);color:var(--amb)}
.note.bd{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.note.inf{background:var(--blu-bg);border-color:var(--blu);color:var(--blu)}
.note.pur{background:var(--pur-bg);border-color:var(--pur);color:var(--pur)}

.bw{background:var(--s3);border-radius:99px;height:4px;margin-top:7px;overflow:hidden}
.bf{height:4px;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

input[type=number],input[type=text]{width:100%;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);
  border-radius:var(--rs);font-family:var(--mono);font-size:.9rem;font-weight:500;
  padding:.65rem .9rem;outline:none;-moz-appearance:textfield;transition:border-color .15s,box-shadow .15s}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(79,70,229,.1);background:var(--s1)}
input::placeholder{color:var(--m2)}

.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:.75rem 1.2rem;
  border-radius:var(--rs);border:none;cursor:pointer;font-family:var(--sans);font-weight:700;
  font-size:.85rem;transition:all .12s;width:100%;margin-bottom:.5rem}
.bp{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;box-shadow:0 4px 14px rgba(79,70,229,.35)}
.bp:active{transform:scale(.97)}
.bp:disabled{opacity:.4;cursor:not-allowed;transform:none}
.bs{background:var(--s1);border:1.5px solid var(--bd);color:var(--m1)}
.bdng{background:none;border:none;cursor:pointer;padding:4px 8px;color:var(--m2);
  border-radius:6px;transition:color .1s;font-size:.85rem}
.bdng:hover{color:var(--red)}

.tgl{position:relative;width:42px;height:24px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tsl{position:absolute;inset:0;background:var(--bd2);border-radius:99px;cursor:pointer;transition:.2s}
.tsl::before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tgl input:checked+.tsl{background:linear-gradient(135deg,#4F46E5,#7C3AED)}
.tgl input:checked+.tsl::before{transform:translateX(18px)}

.er{padding:.75rem 0;border-bottom:1px solid var(--bd)}
.er:last-child{border-bottom:none}
.eh{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.en{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:6px}
.chip{font-size:.55rem;padding:2px 8px;border-radius:99px;font-weight:700;font-family:var(--mono)}
.csbi{background:#DBEAFE;color:#1D4ED8}
.cyes{background:#D1FAE5;color:#065F46}
.cdeb{background:#EDE9FE;color:#6D28D9}

.tab-bar{display:flex;background:var(--s2);border-radius:12px;padding:3px;margin-bottom:.8rem;gap:2px;border:1px solid var(--bd)}
.tab{flex:1;padding:.4rem .5rem;border:none;border-radius:9px;cursor:pointer;
  font-family:var(--sans);font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--m2);background:transparent;transition:all .15s}
.tab.on{color:var(--acc);background:var(--s1);box-shadow:var(--sh)}

hr{border:none;border-top:1px solid var(--bd);margin:.75rem 0}
.row{display:flex;align-items:center;gap:.5rem}
.f1{flex:1}
.il{font-size:.6rem;color:var(--m1);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.gap{display:flex;flex-direction:column;gap:.45rem}
.mb{margin-bottom:.5rem}

.wf{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:.5rem;box-shadow:var(--sh)}
.wfr{display:flex;justify-content:space-between;align-items:center;padding:.65rem .9rem;border-bottom:1px solid var(--bd)}
.wfr:last-child{border-bottom:none}
.wfl{color:var(--m1);font-weight:500;font-size:.72rem}
.wfv{font-family:var(--mono);font-weight:600;font-size:.78rem}
.wfr.hd{background:linear-gradient(135deg,var(--acc-bg),var(--pur-bg))}
.wfr.fin{background:var(--s2)}

.hero{border-radius:var(--r);padding:1.2rem 1.1rem 1rem;margin-bottom:.75rem;border:1px solid;box-shadow:var(--shm);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;opacity:.07;background:currentColor}
.hero-amt{font-family:var(--mono);font-size:2.1rem;font-weight:700;line-height:1;letter-spacing:-.03em;margin:.2rem 0 .65rem}
.hero-lbl{font-size:.58rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.75rem}
.hlbl{color:var(--m1);font-weight:500}
.hval{font-family:var(--mono);font-weight:700;font-size:.78rem}

.log-entry{display:flex;justify-content:space-between;align-items:center;padding:.6rem .9rem;border-bottom:1px solid var(--bd)}
.log-entry:last-child{border-bottom:none}
.log-time{font-size:.62rem;color:var(--m2);font-family:var(--mono);margin-top:2px}
.log-note{font-size:.72rem;color:var(--m1);margin-top:1px}

.loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:.75rem;background:var(--bg)}
.spinner{width:28px;height:28px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;padding:.5rem 1.4rem;border-radius:99px;
  font-size:.75rem;font-weight:700;font-family:var(--sans);z-index:200;animation:fu .18s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(79,70,229,.4)}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.upd{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;color:var(--m2);font-family:var(--mono)}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.bigwrap{position:relative;margin-bottom:.4rem}
.bigpfx{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);
  font-family:var(--mono);font-size:1.1rem;font-weight:600;color:var(--acc);pointer-events:none;z-index:1}
.biginp{padding:.75rem .9rem .75rem 1.9rem !important;font-size:1.15rem !important;font-weight:700 !important}
.biginp:focus{border-color:var(--acc) !important}

.sanity{display:flex;align-items:center;justify-content:space-between;background:var(--acc-bg);
  border-radius:8px;padding:.45rem .8rem;margin-top:.35rem;border:1px solid var(--acc-bd)}
.hint{font-size:.68rem;font-family:var(--mono);margin-top:4px}

.sc-grn{background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border-color:var(--grn-bd)}
.sc-blu{background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border-color:var(--blu-bd)}
.sc-pur{background:linear-gradient(135deg,#F5F3FF,#EDE9FE);border-color:var(--pur-bd)}
.sc-pnk{background:linear-gradient(135deg,#FDF2F8,#FCE7F3);border-color:var(--pnk-bd)}
.sc-amb{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border-color:var(--amb-bd)}

.acc-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.75rem .85rem;box-shadow:var(--sh);border-top:3px solid}
</style>
</head>

<script>
var SUPA_URL='https://jyacewgyqvrqybeyrcig.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5YWNld2d5cXZycXliZXlyY2lnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzUxNTYsImV4cCI6MjA5MDk1MTE1Nn0.yMffM11nwBLiyd3-M4n-Fx5oVirCK4uojkLu2JLw5xU';

var h=React.createElement,useState=React.useState,useEffect=React.useEffect,
    useCallback=React.useCallback,useRef=React.useRef,useMemo=React.useMemo;

var today=new Date();
var mLbl=today.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
var lastDay=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
var dLeft=Math.max(1,lastDay-today.getDate());
var wLeft=Math.max(1,Math.ceil(dLeft/7));

// VERSION 11 — salary = opening balance; prev month credit bill separate
var DEFAULT={
  version:11,
  // salary is the opening/starting debit balance each month
  salary:102844,
  additional_income:[{source:'Bank Interest',amount:0}],
  fixed:[
    {category:'Family',         budget:15000,paid:false},
    {category:'Rent',           budget:21500,paid:false},
    {category:'Milk',           budget:0,    paid:false},
    {category:'Rent Furniture', budget:4000, paid:false},
    {category:'School',         budget:2500, paid:false},
    {category:'Recharge',       budget:1000, paid:false},
    {category:'Gas',            budget:0,    paid:false},
    {category:'Electric',       budget:1000, paid:false},
    {category:'WIFI',           budget:800,  paid:false},
  ],
  variable:[
    {category:'Instamart',budget:6000,card:'SBI'},
    {category:'Swiggy',   budget:1000,card:'SBI'},
    {category:'Amazon',   budget:3000,card:'SBI'},
    {category:'Other',    budget:8000,card:'YES'},
    {category:'Mall',     budget:4000,card:'Debit'},
    {category:'Clothes',  budget:2000,card:'Debit'},
    {category:'Doctor',   budget:1000,card:'Debit'},
  ],
  savings:{budget:15000,done:false},
  debts:[{name:'',amount:0,paid:false}],
  accounts:{
    // debit.balance = actual balance you enter via check-in
    // debit.opening = salary (auto-set from salary field at month start)
    debit:{opening:102844,balance:0},
    sbi:  {limit:200000,available:200000,cashback:0},
    yes:  {limit:510000,available:510000,cashback:0},
  },
  cash:0,
  // Previous month unpaid credit card bills — paid from debit this month
  prev_sbi_bill:0,
  prev_yes_bill:0,
  prev_bill_paid:false,
  debit_spend_log:[],
  updated_at:null,
};

function migrate(s){
  var needsReset=(s.version||0)<11;
  if(!s.accounts) s.accounts=JSON.parse(JSON.stringify(DEFAULT.accounts));
  if(!s.accounts.debit) s.accounts.debit={opening:0,balance:0};
  if(s.accounts.debit.opening===undefined) s.accounts.debit.opening=s.accounts.debit.balance||0;
  if(!s.accounts.sbi) s.accounts.sbi=JSON.parse(JSON.stringify(DEFAULT.accounts.sbi));
  if(!s.accounts.yes) s.accounts.yes=JSON.parse(JSON.stringify(DEFAULT.accounts.yes));
  if(s.accounts.sbi.cashback===undefined) s.accounts.sbi.cashback=0;
  if(s.accounts.yes.cashback===undefined) s.accounts.yes.cashback=0;
  if(s.cash===undefined) s.cash=0;
  if(!s.debit_spend_log) s.debit_spend_log=[];
  if(s.prev_sbi_bill===undefined) s.prev_sbi_bill=0;
  if(s.prev_yes_bill===undefined) s.prev_yes_bill=0;
  if(s.prev_bill_paid===undefined) s.prev_bill_paid=false;
  // salary field — if old data has base_budget, keep it as salary
  if(s.salary===undefined) s.salary=s.base_budget||DEFAULT.salary;
  if(needsReset){
    s.fixed=JSON.parse(JSON.stringify(DEFAULT.fixed)).map(function(df){
      var old=s.fixed&&s.fixed.find(function(f){return f.category===df.category;});
      return old?Object.assign({},df,{paid:!!old.paid}):df;
    });
    s.variable=JSON.parse(JSON.stringify(DEFAULT.variable));
    s.savings=Object.assign({},DEFAULT.savings,{done:s.savings?!!s.savings.done:false});
  }
  s.version=11;
  return s;
}

function fmt(n){return '\u20B9'+Math.round(n).toLocaleString('en-IN');}
function pct(a,b){return b?Math.round(a/b*100):0;}
function bclr(sp,bud){var p=bud?sp/bud:0;return p>1?'var(--red)':p>0.75?'var(--amb)':'var(--grn)';}
function fmtTime(iso){
  var d=new Date(iso);
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+
         d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function timeSince(iso){
  if(!iso) return {label:'never',dot:'var(--red)'};
  var diff=Math.floor((Date.now()-new Date(iso))/60000);
  if(diff<60) return {label:diff+'m ago',dot:'var(--grn)'};
  if(diff<1440) return {label:Math.floor(diff/60)+'h ago',dot:'var(--grn)'};
  var days=Math.floor(diff/1440);
  return {label:days+'d ago',dot:days<=3?'var(--amb)':'var(--red)'};
}
function deepMerge(def,saved){
  var r=Object.assign({},def);
  for(var k in saved){
    if(k in r&&typeof r[k]==='object'&&!Array.isArray(r[k])&&r[k]!==null&&saved[k]!==null)
      r[k]=deepMerge(r[k],saved[k]);
    else r[k]=saved[k];
  }
  return r;
}

// ── Aggregators ────────────────────────────────────────────────────
function totIncome(s){
  return s.salary+(s.additional_income||[]).reduce(function(a,i){return a+i.amount;},0);
}
function paidFixedAmt(s){return s.fixed.filter(function(f){return f.paid;}).reduce(function(a,f){return a+f.budget;},0);}
function unpaidFixedAmt(s){return s.fixed.filter(function(f){return !f.paid;}).reduce(function(a,f){return a+f.budget;},0);}
function totVarBud(s){return s.variable.reduce(function(a,v){return a+v.budget;},0);}
function paidDebts(s){return s.debts.filter(function(d){return d.paid;}).reduce(function(a,d){return a+d.amount;},0);}
function unpaidDebts(s){return s.debts.filter(function(d){return !d.paid;}).reduce(function(a,d){return a+d.amount;},0);}

// Current month credit card spend (limit - available - cashback)
function sbiSpent(s){return Math.max(0,s.accounts.sbi.limit-s.accounts.sbi.available-(s.accounts.sbi.cashback||0));}
function yesSpent(s){return Math.max(0,s.accounts.yes.limit-s.accounts.yes.available-(s.accounts.yes.cashback||0));}
function totCurrCreditSpent(s){return sbiSpent(s)+yesSpent(s);}

// Previous month bills to pay from debit
function prevBillTotal(s){return (s.prev_sbi_bill||0)+(s.prev_yes_bill||0);}

// Debit variable spend log
function debitVarSpent(s){return (s.debit_spend_log||[]).reduce(function(a,e){return a+e.amount;},0);}
function totVarSpent(s){return sbiSpent(s)+yesSpent(s)+debitVarSpent(s);}

// Predicted debit = opening − paid fixed − paid debts − debit var spent − savings (if done) − prev bill (if paid)
function predictedDebit(s){
  var sav=s.savings.done?s.savings.budget:0;
  return s.accounts.debit.opening - paidFixedAmt(s) - paidDebts(s) - debitVarSpent(s) - sav - (s.prev_bill_paid?prevBillTotal(s):0);
}

/*
  SURPLUS = (Debit + Cash) − fixed remaining − all variable remaining − credit bills due
  
  Variable remaining = (all variable budgets) − (all variable spent, across debit+credit)
  Credit bills due   = current credit spend (will come out of debit when bill arrives)
  
  This answers: after paying everything left this month, what's left over?
*/
function waterfall(s){
  var balance=s.accounts.debit.balance||0;
  var cash=s.cash||0;
  var total=balance+cash;

  // Fixed: only unpaid remain
  var fixedRem=unpaidFixedAmt(s);

  // All variable remaining (debit + credit combined)
  var allVarBud=s.variable.reduce(function(a,v){return a+v.budget;},0);
  var allVarSpent=totVarSpent(s); // sbi spent + yes spent + debit var spent
  var allVarRem=Math.max(0,allVarBud-allVarSpent);

  // Credit bills already spent — will need to be paid from debit when bill arrives
  var creditBillsDue=totCurrCreditSpent(s);

  // Prev month bills (unpaid)
  var prevBill=s.prev_bill_paid?0:prevBillTotal(s);

  var afterFixed=total-fixedRem;
  var afterVar=afterFixed-allVarRem;
  var net=afterVar-creditBillsDue-prevBill;

  var savPend=s.savings.done?0:s.savings.budget;
  var debtPend=unpaidDebts(s);

  // Debit-only var for breakdown display
  var dVarBud=s.variable.filter(function(v){return v.card==='Debit';}).reduce(function(a,v){return a+v.budget;},0);
  var dVarSpent=debitVarSpent(s);
  var dVarRem=Math.max(0,dVarBud-dVarSpent);

  return{
    balance:balance,cash:cash,total:total,
    fixedRem:fixedRem,afterFixed:afterFixed,
    allVarBud:allVarBud,allVarSpent:allVarSpent,allVarRem:allVarRem,afterVar:afterVar,
    creditBillsDue:creditBillsDue,prevBill:prevBill,
    dVarBud:dVarBud,dVarSpent:dVarSpent,dVarRem:dVarRem,
    savPend:savPend,debtPend:debtPend,
    surplus:net>0?net:0,short:net<0?-net:0
  };
}

function Insights(props){

    h('div',{className:'sh'},'Log Debit / Cash Spend'),
    h('div',{className:'note inf mb'},'\uD83D\uDCB5 Direct debit or cash purchases (not on credit card)'),
    h('div',{className:'card mb'},
      h('div',{className:'mb'},
        h('div',{className:'il',style:{color:'var(--blu)'}},'Amount'),
        h('div',{className:'bigwrap'},
          h('span',{className:'bigpfx'},'\u20B9'),
          h('input',{className:'biginp',type:'number',inputMode:'numeric',placeholder:'0',value:sa,onChange:function(e){setSa(e.target.value);}})
        )
      ),
      h('div',null,
        h('div',{className:'il'},'Note (optional)'),
        h('input',{type:'text',placeholder:'e.g. Petrol, Auto, Grocery\u2026',value:sn,onChange:function(e){setSn(e.target.value);}})
      )
    ),

    s.debit_spend_log&&s.debit_spend_log.length>0&&h('div',null,

}

function DebitSpendLog(props){
  var s=props.s,save=props.save,toast=props.toast;
  var sorted=(s.debit_spend_log||[]).slice().sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});
  var total=debitVarSpent(s);
  var wf=waterfall(s);
  function remove(ts){
    var newLog=s.debit_spend_log.filter(function(e){return e.ts!==ts;});
    save(Object.assign({},s,{debit_spend_log:newLog})).then(function(){toast('Removed');});
  }
  return h('div',{className:'wf'},
    sorted.map(function(e){
      return h('div',{key:e.ts,className:'log-entry'},
        h('div',null,
          h('div',{style:{fontFamily:'var(--mono)',fontWeight:700,fontSize:'.85rem',color:'var(--red)'}},'−'+fmt(e.amount)),
          h('div',{className:'log-note'},e.note),
          h('div',{className:'log-time'},fmtTime(e.ts))
        ),
        h('button',{className:'bdng',onClick:function(){remove(e.ts);}},'\u2715')
      );
    }),
    h('div',{style:{padding:'.55rem .9rem',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--s2)',borderTop:'1px solid var(--bd)'}},
      h('span',{style:{fontSize:'.68rem',color:'var(--m1)',fontWeight:700}},'Total logged'),
      h('span',{style:{fontFamily:'var(--mono)',fontSize:'.78rem',fontWeight:700,color:'var(--acc)'}},fmt(total))
    )
  );
}

// ── EXPENSES ────────────────────────────────────────────────────────
function Expenses(props){
  var s=props.s,save=props.save,toast=props.toast;
  var _tab=useState('fixed'),tab=_tab[0],setTab=_tab[1];
  var tvb=totVarBud(s),tvs=totVarSpent(s);

  var varWithSpent=useMemo(function(){
    function dist(amount,cats){
      var tot=cats.reduce(function(a,c){return a+c.budget;},0);
      if(!tot) return cats.map(function(c){return Object.assign({},c,{spent:0});});
      return cats.map(function(c){return Object.assign({},c,{spent:Math.round(amount*c.budget/tot)});});
    }
    return [].concat(
      dist(sbiSpent(s),s.variable.filter(function(v){return v.card==='SBI';})),
      dist(yesSpent(s),s.variable.filter(function(v){return v.card==='YES';})),
      dist(debitVarSpent(s),s.variable.filter(function(v){return v.card==='Debit';}))
    );
  },[s]);

  return h('div',{className:'page'},
    h('div',{style:{fontSize:'1.1rem',fontWeight:800,padding:'.5rem 0 .75rem'}},'Expenses'),
    h('div',{className:'tab-bar'},
      ['fixed','variable'].map(function(t){
        return h('button',{key:t,className:'tab'+(tab===t?' on':''),onClick:function(){setTab(t);}},t);
      })
    ),

    tab==='fixed'&&h('div',null,
      unpaidFixedAmt(s)>0
        ?h('div',{className:'note wn'},'\uD83D\uDD14 '+fmt(unpaidFixedAmt(s))+' still to pay')
        :h('div',{className:'note gd'},'\u2713 All fixed expenses paid'),
      h('div',{className:'card'},
        s.fixed.map(function(f,i){
          return h('div',{key:i,className:'er'},
            h('div',{className:'eh'},
              h('div',{className:'en'},
                h('span',{style:{fontSize:'.75rem'}},f.paid?'\uD83D\uDFE2':'\u26AA'),
                f.category
              ),
              h(Tog,{v:f.paid,onChange:function(v){
                var fx=s.fixed.map(function(x,j){return j===i?Object.assign({},x,{paid:v}):x;});
                save(Object.assign({},s,{fixed:fx}));
                toast(f.category+(v?' paid':' unpaid'));
              }})
            ),
            h('div',{style:{display:'flex',alignItems:'center',gap:6,marginTop:4}},
              h('span',{style:{fontSize:'.6rem',color:'var(--m2)',fontFamily:'var(--mono)',flexShrink:0}},'\u20B9'),
              h('input',{
                type:'number',inputMode:'numeric',
                value:f.budget||0,
                style:{padding:'.3rem .5rem',fontSize:'.8rem',borderRadius:6,flex:1},
                onChange:function(e){
                  var fx=s.fixed.map(function(x,j){return j===i?Object.assign({},x,{budget:Number(e.target.value)}):x;});
                  save(Object.assign({},s,{fixed:fx}));
                }
              })
            ),
            h(Bar,{sp:f.paid?f.budget:0,bud:f.budget})
          );
        })
      ),
      h('div',{style:{marginTop:'.5rem',padding:'.5rem .9rem',background:'var(--acc-bg)',borderRadius:'var(--rs)',border:'1px solid var(--acc-bd)',display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('span',{style:{fontSize:'.72rem',color:'var(--acc)',fontWeight:600}},'Total fixed budget'),
        h('span',{style:{fontFamily:'var(--mono)',fontSize:'.78rem',fontWeight:700,color:'var(--acc)'}},fmt(s.fixed.reduce(function(a,f){return a+f.budget;},0)))
      )
    ),

    tab==='variable'&&h('div',null,
      h('div',{className:'card mb sc-grn'},
        h('div',{className:'sl',style:{color:'var(--grn)'}},'Variable Remaining'),
        h('div',{className:'sv',style:{color:tvb-tvs<0?'var(--red)':'var(--grn)'}},fmt(tvb-tvs)),
        h('div',{className:'ss'},fmt(Math.round((tvb-tvs)/wLeft))+'/wk \u00B7 '+wLeft+' wks left')
      ),
      h('div',{className:'note inf',style:{marginBottom:'.75rem'}},
        'SBI '+fmt(sbiSpent(s))+' \u00B7 YES '+fmt(yesSpent(s))+' \u00B7 Debit '+fmt(debitVarSpent(s))),
      h('div',{className:'card'},
        varWithSpent.map(function(v,i){
          var rem=v.budget-v.spent;
          var chipCls=v.card==='SBI'?'csbi':v.card==='YES'?'cyes':'cdeb';
          return h('div',{key:i,className:'er'},
            h('div',{className:'eh'},
              h('div',{className:'en'},v.category,h('span',{className:'chip '+chipCls},v.card)),
              h('span',{style:{fontFamily:'var(--mono)',fontSize:'.72rem',color:rem>=0?'var(--grn)':'var(--red)',fontWeight:700}},
                rem>=0?fmt(rem)+' left':fmt(-rem)+' over')
            ),
            h(Bar,{sp:v.spent,bud:v.budget}),
            h('div',{style:{marginTop:3,fontSize:'.68rem',color:'var(--m2)',fontFamily:'var(--mono)'}},'budget '+fmt(v.budget))
          );
        })
      )
    )
  );
}

// ── SAVINGS & DEBTS ─────────────────────────────────────────────────

  return h('div',{className:'page'},
    h('div',{style:{fontSize:'1.1rem',fontWeight:800,padding:'.5rem 0 .75rem'}},'Savings & Debts'),
    h('div',{className:'sh'},'Savings'),
    s.savings.done
      ?h('div',{className:'note gd mb'},'\u2713 '+fmt(s.savings.budget)+' transferred')
      :h('div',{className:'note pur mb'},'\u23F3 '+fmt(s.savings.budget)+' pending'),
    h('div',{className:'card sc-pur mb'},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',null,
          h('div',{style:{fontWeight:700,fontSize:'.88rem',color:'var(--pur)'}},'Monthly Savings'),

    h('div',{className:'gap mb'},
      s.debts.map(function(d,i){

          h('div',{className:'row'},
            h('div',{className:'f1 gap'},
              h('input',{type:'text',value:d.name,placeholder:'Debt name',onChange:function(e){
                var dts=s.debts.map(function(x,j){return j===i?Object.assign({},x,{name:e.target.value}):x;});
                save(Object.assign({},s,{debts:dts}));

              h('input',{type:'number',value:d.amount||'',inputMode:'numeric',onChange:function(e){
                var dts=s.debts.map(function(x,j){return j===i?Object.assign({},x,{amount:Number(e.target.value)}):x;});
                save(Object.assign({},s,{debts:dts}));
              }})
            ),
            h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:6}},
              h(Tog,{v:!!d.paid,onChange:function(v){
                var dts=s.debts.map(function(x,j){return j===i?Object.assign({},x,{paid:v}):x;});
                save(Object.assign({},s,{debts:dts}));
              }}),
              h('span',{style:{fontSize:'.58rem',color:'var(--m2)'}},d.paid?'paid':'unpaid'),
              h('button',{className:'bdng',onClick:function(){save(Object.assign({},s,{debts:s.debts.filter(function(_,j){return j!==i;})}));}},'\u2715')
            )
          )
        );
      })
    ),
    h('button',{className:'btn bs',onClick:function(){save(Object.assign({},s,{debts:s.debts.concat([{name:'',amount:0,paid:false}])}));}},'\uFF0B Add Debt')
  );
}

// ── SETTINGS ────────────────────────────────────────────────────────
function Settings(props){
  var s=props.s,save=props.save,toast=props.toast;
  return h('div',{className:'page'},
    h('div',{style:{fontSize:'1.1rem',fontWeight:800,padding:'.5rem 0 .75rem'}},'Settings'),

    h('div',{className:'sh'},'Salary / Starting Balance'),
    h('div',{className:'note inf mb'},'\uD83D\uDCB0 This is your monthly salary — it sets the opening debit balance'),
    h('div',{className:'card mb'},
      h('div',{className:'il'},'Monthly Salary'),
      h('input',{type:'number',value:s.salary||0,inputMode:'numeric',onChange:function(e){
        var sal=Number(e.target.value);
        save(Object.assign({},s,{
          salary:sal,
          accounts:Object.assign({},s.accounts,{debit:Object.assign({},s.accounts.debit,{opening:sal})})
        }));
      }})
    ),

    h('div',{className:'sh'},'Additional Income'),
    h('div',{className:'gap mb'},
      s.additional_income.map(function(inc,i){
        return h('div',{key:i,className:'card'},
          h('div',{className:'row'},
            h('div',{className:'f1 gap'},
              h('input',{type:'text',placeholder:'Source',value:inc.source||'',onChange:function(e){
                var ai=s.additional_income.map(function(x,j){return j===i?Object.assign({},x,{source:e.target.value}):x;});
                save(Object.assign({},s,{additional_income:ai}));
              }}),
              h('input',{type:'number',placeholder:'Amount',value:inc.amount||0,inputMode:'numeric',onChange:function(e){
                var ai=s.additional_income.map(function(x,j){return j===i?Object.assign({},x,{amount:Number(e.target.value)}):x;});
                save(Object.assign({},s,{additional_income:ai}));
              }})
            ),
            h('button',{className:'bdng',onClick:function(){save(Object.assign({},s,{additional_income:s.additional_income.filter(function(_,j){return j!==i;})}));}},'\u2715')
          )
        );
      })
    ),
    h('button',{className:'btn bs mb',onClick:function(){save(Object.assign({},s,{additional_income:s.additional_income.concat([{source:'',amount:0}])}));}},'\uFF0B Add Income'),

    h('div',{className:'sh'},'Cashback'),
    h('div',{className:'note inf mb'},'\uD83C\uDF81 Auto-deducted from credit card bill'),
    h('div',{className:'card gap mb'},
      h('div',null,h('div',{className:'il'},'SBI Cashback'),h('input',{type:'number',value:s.accounts.sbi.cashback||0,inputMode:'numeric',onChange:function(e){save(Object.assign({},s,{accounts:Object.assign({},s.accounts,{sbi:Object.assign({},s.accounts.sbi,{cashback:Number(e.target.value)})})}));}})),
      h('div',null,h('div',{className:'il'},'YES Cashback'),h('input',{type:'number',value:s.accounts.yes.cashback||0,inputMode:'numeric',onChange:function(e){save(Object.assign({},s,{accounts:Object.assign({},s.accounts,{yes:Object.assign({},s.accounts.yes,{cashback:Number(e.target.value)})})}));}}))
    ),

    h('div',{className:'sh'},'Savings Target'),
    h('div',{className:'card mb'},
      h('div',{className:'il'},'Monthly Savings'),
      h('input',{type:'number',value:s.savings.budget||0,inputMode:'numeric',onChange:function(e){save(Object.assign({},s,{savings:Object.assign({},s.savings,{budget:Number(e.target.value)})}));}})
    ),

    h('div',{className:'sh'},'Credit Limits'),
    h('div',{className:'card gap mb'},
      h('div',null,h('div',{className:'il'},'SBI Limit'),h('input',{type:'number',value:s.accounts.sbi.limit,inputMode:'numeric',onChange:function(e){save(Object.assign({},s,{accounts:Object.assign({},s.accounts,{sbi:Object.assign({},s.accounts.sbi,{limit:Number(e.target.value)})})}));}})),
      h('div',null,h('div',{className:'il'},'YES Limit'),h('input',{type:'number',value:s.accounts.yes.limit,inputMode:'numeric',onChange:function(e){save(Object.assign({},s,{accounts:Object.assign({},s.accounts,{yes:Object.assign({},s.accounts.yes,{limit:Number(e.target.value)})})}));}}))
    ),

    h('div',{className:'sh'},'Month Reset'),
    h('div',{className:'note wn mb'},'\u26A0 Resets fixed paid, savings, spend log and prev bills for new month'),
    h('button',{className:'btn bs mb',onClick:function(){
      if(!confirm('Start new month? This resets fixed, savings, spend log and prev bills.')) return;
      var ns=Object.assign({},s,{
        debit_spend_log:[],
        savings:Object.assign({},s.savings,{done:false}),
        fixed:s.fixed.map(function(f){return Object.assign({},f,{paid:false});}),
        debts:s.debts.map(function(d){return Object.assign({},d,{paid:false});}),
        prev_sbi_bill:0,prev_yes_bill:0,prev_bill_paid:false,
        accounts:Object.assign({},s.accounts,{
          debit:{opening:s.salary||0,balance:s.salary||0},
          sbi:Object.assign({},s.accounts.sbi,{available:s.accounts.sbi.limit}),
          yes:Object.assign({},s.accounts.yes,{available:s.accounts.yes.limit}),
        }),
        updated_at:new Date().toISOString(),
      });
      save(ns).then(function(){toast('New month started \u2713');});
    }},'\uD83D\uDD04 New Month Reset'),

    h('div',{className:'sh',style:{color:'var(--red)'}},'Danger Zone'),
    h('button',{className:'btn mb',style:{background:'var(--red-bg)',color:'var(--red)',border:'1px solid var(--red-bd)'},
      onClick:function(){
        if(confirm('Reset ALL data to defaults?')) save(JSON.parse(JSON.stringify(DEFAULT))).then(function(){toast('Reset \u2713');});
      }
    },'Reset to defaults')
  );
}

// ── APP ─────────────────────────────────────────────────────────────
function App(){
  var _st=useState(null),state=_st[0],setState=_st[1];
  var _pg=useState('overview'),page=_pg[0],setPage=_pg[1];
  var _tm=useState(''),tmsg=_tm[0],setTmsg=_tm[1];
  var timer=useRef(null);

  function toast(msg){
    setTmsg(msg);
    if(timer.current) clearTimeout(timer.current);
    timer.current=setTimeout(function(){setTmsg('');},2200);
  }

  useEffect(function(){
    db.from('budget_state').select('data').eq('id','main').single()
      .then(function(res){
        var data=res.data;
        if(data&&data.data){
          var merged=deepMerge(JSON.parse(JSON.stringify(DEFAULT)),data.data);
          setState(migrate(merged));
        } else {
          setState(JSON.parse(JSON.stringify(DEFAULT)));
        }
      })
      .catch(function(){setState(JSON.parse(JSON.stringify(DEFAULT)));});
  },[]);

  var save=useCallback(function(ns){
    setState(ns);
    return db.from('budget_state').upsert({id:'main',data:ns,updated_at:new Date().toISOString()},{onConflict:'id'});
  },[]);

  if(!state) return h('div',{className:'loading'},h('div',{className:'spinner'}),h('div',{style:{fontSize:'.72rem',color:'var(--m2)',fontFamily:'var(--mono)'}},'Loading\u2026'));

  var navItems=[
    {id:'overview',label:'Overview'},
    {id:'checkin', label:'Check-In'},
    {id:'expenses',label:'Expenses'},
    {id:'savings', label:'Debts'},
    {id:'settings',label:'Settings'},
  ];

  function navIcon(id){
    if(id==='overview') return h('svg',{viewBox:'0 0 24 24'},h('rect',{x:3,y:3,width:7,height:7,rx:1.5}),h('rect',{x:14,y:3,width:7,height:7,rx:1.5}),h('rect',{x:3,y:14,width:7,height:7,rx:1.5}),h('rect',{x:14,y:14,width:7,height:7,rx:1.5}));
    if(id==='checkin')  return h('svg',{viewBox:'0 0 24 24'},h('circle',{cx:12,cy:12,r:9}),h('polyline',{points:'12 6 12 12 16 14'}));
    if(id==='expenses') return h('svg',{viewBox:'0 0 24 24'},h('line',{x1:8,y1:6,x2:21,y2:6}),h('line',{x1:8,y1:12,x2:21,y2:12}),h('line',{x1:8,y1:18,x2:21,y2:18}),h('line',{x1:3,y1:6,x2:3.01,y2:6}),h('line',{x1:3,y1:12,x2:3.01,y2:12}),h('line',{x1:3,y1:18,x2:3.01,y2:18}));
    if(id==='savings')  return h('svg',{viewBox:'0 0 24 24'},h('path',{d:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'}));
    if(id==='settings') return h('svg',{viewBox:'0 0 24 24'},h('circle',{cx:12,cy:12,r:3}),h('path',{d:'M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z'}));
  }

  return h('div',null,
    page==='overview'&&h(Overview,  {s:state,save:save}),
    page==='checkin' &&h(Checkin,   {s:state,save:save,toast:toast}),
    page==='expenses'&&h(Expenses,  {s:state,save:save,toast:toast}),
    page==='savings' &&h(SavingsDebts,{s:state,save:save,toast:toast}),
    page==='settings'&&h(Settings,  {s:state,save:save,toast:toast}),
    h('nav',{className:'nav'},
      navItems.map(function(n){
        return h('button',{key:n.id,className:'nb'+(page===n.id?' on':''),onClick:function(){setPage(n.id);}},
          navIcon(n.id),n.label,h('span',{className:'nb-dot'})
        );
      })
    ),
    h(Toast,{msg:tmsg})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
