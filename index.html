<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#FAFAFA"/>
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#F7F7F8; --surface:#fff; --border:#EBEBED; --border2:#F0F0F2;
  --text:#0D0D0F; --muted:#6B6B72; --subtle:#A8A8B0;
  --accent:#5B5BD6; --accent-soft:#EFEFFD; --accent-bd:#C4C4F4;
  --green:#16A34A; --green-bg:#F0FDF4; --green-bd:#BBF7D0;
  --red:#DC2626;   --red-bg:#FEF2F2;   --red-bd:#FECACA;
  --amber:#D97706; --amber-bg:#FFFBEB; --amber-bd:#FDE68A;
  --nav-h:60px; --safe-b:env(safe-area-inset-bottom,0px);
  --r:14px; --rs:10px;
  --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;font-size:15px}
#root{display:flex;flex-direction:column;min-height:100%}

/* ── Layout ── */
.page{flex:1;padding:.75rem 1rem calc(var(--nav-h) + var(--safe-b) + 1.25rem);max-width:540px;margin:0 auto;width:100%}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));
  background:rgba(255,255,255,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:100;padding-bottom:var(--safe-b)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:none;cursor:pointer;color:var(--subtle);font-family:var(--sans);
  font-size:.6rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;transition:color .15s}
.nb.on{color:var(--accent)}
.nb svg{width:20px;height:20px;stroke-width:1.8;fill:none;stroke:currentColor}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.85rem 1rem}
.card+.card{margin-top:.5rem}

/* ── Section header ── */
.sh{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--subtle);
  font-weight:700;margin:1.2rem 0 .5rem;display:flex;align-items:center;gap:.5rem}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Stat label / value ── */
.sl{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--subtle);font-weight:600;margin-bottom:3px}
.sv{font-size:1.35rem;font-weight:700;line-height:1;font-family:var(--mono);letter-spacing:-.02em}
.ss{font-size:.7rem;color:var(--muted);margin-top:3px;font-family:var(--mono)}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.5rem}

/* ── Colors ── */
.cg{color:var(--green)} .cr{color:var(--red)} .ca{color:var(--amber)} .cm{color:var(--muted)}

/* ── Pills ── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:99px;
  font-size:.67rem;font-weight:600;border:1px solid transparent;white-space:nowrap}
.pill.gd{background:var(--green-bg);border-color:var(--green-bd);color:#14532D}
.pill.wn{background:var(--amber-bg);border-color:var(--amber-bd);color:#78350F}
.pill.bd{background:var(--red-bg);border-color:var(--red-bd);color:#7F1D1D}
.pill.inf{background:var(--accent-soft);border-color:var(--accent-bd);color:#312E81}
.pill-row{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem}

/* ── Note bar ── */
.note{display:flex;align-items:center;gap:6px;padding:.4rem .7rem;border-radius:8px;
  font-size:.72rem;font-weight:500;margin-bottom:.5rem;border-left:2.5px solid}
.note.gd{background:var(--green-bg);border-color:var(--green);color:#14532D}
.note.wn{background:var(--amber-bg);border-color:var(--amber);color:#78350F}
.note.bd{background:var(--red-bg);border-color:var(--red);color:#7F1D1D}
.note.inf{background:var(--accent-soft);border-color:var(--accent);color:#312E81}

/* ── Progress bar ── */
.bw{background:var(--border2);border-radius:99px;height:3px;margin-top:6px;overflow:hidden}
.bf{height:3px;border-radius:99px;transition:width .35s ease}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:.6rem;font-weight:600}
.bg-b{background:#DCFCE7;color:#14532D} .br-b{background:#FEE2E2;color:#7F1D1D}
.ba-b{background:#FEF3C7;color:#78350F} .bm-b{background:var(--border2);color:var(--muted)}

/* ── Inputs ── */
input[type=number],input[type=text]{
  width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--text);
  border-radius:var(--rs);font-family:var(--mono);font-size:.9rem;font-weight:500;
  padding:.6rem .85rem;outline:none;appearance:none;-moz-appearance:textfield;transition:border-color .15s,box-shadow .15s}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,91,214,.1);background:var(--surface)}
input::placeholder{color:var(--subtle)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:.65rem 1.1rem;border-radius:var(--rs);border:none;cursor:pointer;
  font-family:var(--sans);font-weight:600;font-size:.88rem;transition:all .12s;width:100%}
.bp{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,91,214,.3)}
.bp:active{transform:scale(.97);opacity:.9}
.bs{background:var(--surface);border:1.5px solid var(--border);color:var(--muted)}
.bdng{background:none;border:none;cursor:pointer;padding:4px;color:var(--red);font-size:.88rem;line-height:1}

/* ── Toggle ── */
.tgl{position:relative;width:42px;height:25px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#D1D5DB;border-radius:99px;cursor:pointer;transition:.2s}
.tsl:before{content:'';position:absolute;width:19px;height:19px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl input:checked+.tsl{background:var(--accent)}
.tgl input:checked+.tsl:before{transform:translateX(17px)}

/* ── Expense rows ── */
.er{padding:.7rem 0;border-bottom:1px solid var(--border)}
.er:last-child{border-bottom:none}
.eh{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.en{font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:5px}
.chip{font-size:.58rem;padding:2px 6px;border-radius:99px;font-weight:600}
.cs_{background:#DBEAFE;color:#1E40AF} .cy{background:#EDE9FE;color:#6D28D9} .cd{background:var(--border2);color:var(--muted)}

/* ── Tab bar ── */
.tab-bar{display:flex;background:var(--border2);border-radius:10px;padding:3px;margin-bottom:.8rem;gap:2px}
.tab{flex:1;padding:.4rem .6rem;border:none;border-radius:7px;cursor:pointer;
  font-family:var(--sans);font-size:.7rem;font-weight:600;letter-spacing:.03em;text-transform:uppercase;
  color:var(--muted);background:transparent;transition:all .15s}
.tab.on{color:var(--accent);background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── Divider ── */
hr{border:none;border-top:1px solid var(--border);margin:.75rem 0}
.row{display:flex;align-items:center;gap:.5rem}
.f1{flex:1}
.mono{font-family:var(--mono)}
.sm{font-size:.75rem}
.il{font-size:.62rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.gap{display:flex;flex-direction:column;gap:.45rem}
.mb{margin-bottom:.5rem}

/* ── Waterfall ── */
.wf{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:.5rem}
.wfr{display:flex;justify-content:space-between;align-items:center;padding:.5rem .9rem;border-bottom:1px solid var(--border);font-size:.78rem}
.wfr:last-child{border-bottom:none}
.wfl{color:var(--muted);font-weight:500;font-size:.75rem}
.wfv{font-family:var(--mono);font-weight:600;font-size:.78rem}
.wfr.hd{background:var(--bg)}
.wfr.fin{background:var(--accent-soft)}

/* ── Hero banner ── */
.hero{border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:.75rem;border:1px solid}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem}
.hero-lbl{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.hero-amt{font-family:var(--mono);font-size:1.6rem;font-weight:700;line-height:1;letter-spacing:-.02em}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:2.5px 0;font-size:.75rem}
.hlbl{color:var(--muted);font-weight:500}
.hval{font-family:var(--mono);font-weight:600;font-size:.76rem}

/* ── Loading / Toast ── */
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:.75rem}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%);
  background:#0D0D0F;color:#fff;padding:.55rem 1.2rem;border-radius:99px;
  font-size:.78rem;font-weight:600;z-index:200;animation:fu .18s ease;white-space:nowrap}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Updated badge ── */
.upd{display:inline-flex;align-items:center;gap:4px;font-size:.62rem;color:var(--subtle);font-family:var(--mono)}
.upd-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.upd-dot.stale{background:var(--amber)}
.upd-dot.old{background:var(--red)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo} = React;

const SUPA_URL = 'https://jyacewgyqvrqybeyrcig.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5YWNld2d5cXZycXliZXlyY2lnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzUxNTYsImV4cCI6MjA5MDk1MTE1Nn0.yMffM11nwBLiyd3-M4n-Fx5oVirCK4uojkLu2JLw5xU';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const WARN = 0.75;

const DEFAULT = {
  version:5,
  base_budget:83500,
  additional_income:[{source:'Bank Interest',amount:69}],
  fixed:[
    {category:'Family',         budget:15000,paid:true, spent:15000},
    {category:'Rent',           budget:21500,paid:true, spent:21500},
    {category:'Milk',           budget:2940, paid:true, spent:2940},
    {category:'Rent_Furniture', budget:2994, paid:true, spent:2994},
    {category:'School',         budget:3000, paid:false,spent:0},
    {category:'Recharge',       budget:1000, paid:false,spent:0},
    {category:'Gas',            budget:531,  paid:false,spent:0},
    {category:'Electric',       budget:735,  paid:true, spent:735},
    {category:'WIFI',           budget:800,  paid:false,spent:0},
  ],
  variable:[
    {category:'Instamart',budget:6000,card:'SBI'},
    {category:'Swiggy',   budget:1000,card:'SBI'},
    {category:'Amazon',   budget:3000,card:'SBI'},
    {category:'Other',    budget:8000,card:'YES'},
    {category:'Mall',     budget:4000,card:'Debit'},
    {category:'Clothes',  budget:2000,card:'Debit'},
    {category:'Doctor',   budget:1000,card:'Debit'},
  ],
  savings:{budget:10000,done:false},
  debts:[{name:'Credit Bill',amount:7932,paid:false}],
  accounts:{
    debit:{balance:83569},
    sbi:  {limit:20000,available:20000,cashback:0},
    yes:  {limit:51000,available:51000,cashback:0},
  },
  cash:0,
  updated_at: null,
};

function migrate(s){
  if(!s.accounts?.sbi?.cashback) s.accounts.sbi.cashback=0;
  if(!s.accounts?.yes?.cashback) s.accounts.yes.cashback=0;
  if(s.cash===undefined) s.cash=0;
  if(!s.updated_at) s.updated_at=null;
  delete s.checkin_log;
  s.version=5;
  return s;
}

const today   = new Date();
const mLbl    = today.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
const lastDay = new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
const dLeft   = Math.max(1, lastDay - today.getDate());
const wLeft   = Math.max(1, Math.ceil(dLeft/7));

const fmt  = n=>'₹'+Math.round(n).toLocaleString('en-IN');
const pct  = (a,b)=>b?Math.round(a/b*100):0;
const bClr = (sp,bud)=>{const p=bud?sp/bud:0;return p>1?'var(--red)':p>WARN?'var(--amber)':'var(--green)'};
const bCls = (sp,bud)=>!sp?'bm-b':sp>bud?'br-b':sp/bud>WARN?'ba-b':'bg-b';
const bTxt = (sp,bud)=>!sp?'—':sp>bud?`+${fmt(sp-bud)}`:`${fmt(bud-sp)} left`;

// ── Time since last update ────────────────────────────────────────────────────
function timeSince(iso) {
  if (!iso) return null;
  const diff = Math.floor((Date.now() - new Date(iso)) / 60000); // minutes
  if (diff < 60)   return { label: `${diff}m ago`,   cls: 'upd-dot' };
  if (diff < 1440) return { label: `${Math.floor(diff/60)}h ago`,  cls: 'upd-dot' };
  const days = Math.floor(diff/1440);
  if (days <= 4)   return { label: `${days}d ago`,   cls: 'upd-dot stale' };
  return              { label: `${days}d ago`,        cls: 'upd-dot old' };
}

// ── Aggregators ───────────────────────────────────────────────────────────────
const totIncome    = s=>s.base_budget+s.additional_income.reduce((a,i)=>a+i.amount,0);
const paidFixed    = s=>s.fixed.filter(f=>f.paid).reduce((a,f)=>a+f.spent,0);
const unpaidFixed  = s=>s.fixed.filter(f=>!f.paid).reduce((a,f)=>a+f.budget,0);
const totVarBud    = s=>s.variable.reduce((a,v)=>a+v.budget,0);
const totDebts     = s=>s.debts.reduce((a,d)=>a+d.amount,0);
const paidDebts    = s=>s.debts.filter(d=>d.paid).reduce((a,d)=>a+d.amount,0);
const unpaidDebts  = s=>totDebts(s)-paidDebts(s);
const sbiSpent     = s=>Math.max(0,s.accounts.sbi.limit -s.accounts.sbi.available -(s.accounts.sbi.cashback||0));
const yesSpent     = s=>Math.max(0,s.accounts.yes.limit -s.accounts.yes.available -(s.accounts.yes.cashback||0));
const totCreditBills = s=>sbiSpent(s)+yesSpent(s);

// ── Waterfall ─────────────────────────────────────────────────────────────────
// KEY FIX: use totalFunds (debit + cash) as starting point, not just balance.
// afterDebts vs dVarBud = single source of truth for surplus/shortBy:
//   afterDebts >= dVarBud → surplus, dVarSpent = 0
//   afterDebts < dVarBud  → shortBy = dVarBud - afterDebts (debit var partially/fully consumed)
//   afterDebts < 0        → fully short, shortBy = -afterDebts (dVarBud already gone)
function waterfall(s){
  const balance    = s.accounts.debit.balance;
  const cash       = s.cash||0;
  const totalFunds = balance+cash;
  const creditBill = totCreditBills(s);
  const fixedPend  = unpaidFixed(s);
  const savPend    = s.savings.done?0:s.savings.budget;
  const debtPend   = unpaidDebts(s);
  const dVarBud    = s.variable.filter(v=>v.card==='Debit').reduce((a,v)=>a+v.budget,0);

  // Waterfall from totalFunds. Savings only counted if funds remain after bills+fixed+debts.
  const afterBills  = totalFunds - creditBill;
  const afterFixed  = afterBills  - fixedPend;
  const afterDebts  = afterFixed  - debtPend;
  // Only deduct savings if we actually have money left (don't inflate shortfall with savings)
  const afterSav    = afterDebts  - (afterDebts > 0 ? savPend : 0);

  const dVarAvail = Math.max(0, afterSav);
  const dVarSpent = Math.max(0, dVarBud - afterSav);
  // shortBy: if afterSav < 0 → short by that amount (debit var gone)
  //          if 0 <= afterSav < dVarBud → short on debit var portion
  //          if afterSav >= dVarBud → surplus
  const shortBy   = afterSav < 0
    ? Math.abs(afterSav)
    : Math.max(0, dVarBud - afterSav);
  const surplus   = Math.max(0, afterSav - dVarBud);

  return {
    balance,cash,totalFunds,
    creditBill,afterBills,
    fixedPend,afterFixed,
    debtPend,afterDebts,
    savPend,afterSav,
    dVarBud,dVarAvail,dVarSpent,
    shortBy,surplus,
  };
}

function distByRatio(amount,cats){
  const tot=cats.reduce((a,c)=>a+c.budget,0);
  if(!tot) return cats.map(c=>({...c,spent:0}));
  return cats.map(c=>({...c,spent:Math.round(amount*c.budget/tot)}));
}

function varWithSpent(s){
  const wf=waterfall(s);
  return[
    ...distByRatio(sbiSpent(s),      s.variable.filter(v=>v.card==='SBI')),
    ...distByRatio(yesSpent(s),      s.variable.filter(v=>v.card==='YES')),
    ...distByRatio(wf.dVarSpent,     s.variable.filter(v=>v.card==='Debit')),
  ];
}
const totVarSpent = s=>{const wf=waterfall(s);return sbiSpent(s)+yesSpent(s)+wf.dVarSpent};

// ── Mini components ───────────────────────────────────────────────────────────
function Bar({sp,bud}){
  const p=bud?Math.min(100,sp/bud*100):0;
  return <div className="bw"><div className="bf" style={{width:p+'%',background:bClr(sp,bud)}}/></div>;
}
function Tog({v,onChange}){
  return <label className="tgl"><input type="checkbox" checked={v} onChange={e=>onChange(e.target.checked)}/><span className="tsl"/></label>;
}
function Toast({msg}){return msg?<div className="toast">{msg}</div>:null}

function UpdatedAt({ts}){
  const info = timeSince(ts);
  if(!info) return <span className="upd"><span className="upd-dot old"/>never updated</span>;
  return <span className="upd"><span className={info.cls}/>{info.label}</span>;
}

// ── Waterfall UI ─────────────────────────────────────────────────────────────
function WaterfallCard({s}){
  const wf=waterfall(s);
  const rows=[
    {label:'Credit bills (SBI + YES)', val:-wf.creditBill, after:wf.afterBills, show:wf.creditBill>0},
    {label:'Unpaid fixed',             val:-wf.fixedPend,  after:wf.afterFixed,  show:wf.fixedPend>0},
    {label:'Savings',                  val:-wf.savPend,    after:wf.afterSav,    show:wf.savPend>0},
    {label:'Debts',                    val:-wf.debtPend,   after:wf.afterDebts,  show:wf.debtPend>0},
    {label:'Debit variable budget',    val:-wf.dVarBud,    after:wf.afterDebts-wf.dVarBud, show:true},
  ].filter(r=>r.show);

  return(
    <div className="wf">
      <div className="wfr hd">
        <span className="wfl" style={{color:'var(--text)',fontWeight:700}}>Debit balance</span>
        <span className="wfv">{fmt(wf.balance)}</span>
      </div>
      {wf.cash>0 && (
        <div className="wfr hd">
          <span className="wfl">+ Cash on hand</span>
          <span className="wfv cg">{fmt(wf.cash)}</span>
        </div>
      )}
      {rows.map((r,i)=>{
        const col=r.after<0?'var(--red)':r.after<3000?'var(--amber)':'var(--green)';
        return(
          <div key={i} className="wfr">
            <div>
              <div className="wfl">{r.label}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:'.65rem',color:'var(--red)',marginTop:1}}>{fmt(r.val)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:'.58rem',color:'var(--subtle)'}}>left</div>
              <div className="wfv" style={{color:col}}>{fmt(r.after)}</div>
            </div>
          </div>
        );
      })}
      <div className="wfr fin">
        <span className="wfl" style={{fontWeight:700,color:wf.shortBy>0?'var(--red)':'var(--green)'}}>
          {wf.shortBy>0?'⚠ Short by':'✓ Surplus'}
        </span>
        <span className="wfv" style={{fontSize:'.95rem',color:wf.shortBy>0?'var(--red)':'var(--green)'}}>
          {fmt(wf.shortBy>0?wf.shortBy:wf.surplus)}
        </span>
      </div>
      {wf.dVarAvail<wf.dVarBud&&(
        <div className="wfr" style={{background:'var(--amber-bg)'}}>
          <span className="wfl" style={{color:'var(--amber)'}}>Debit var headroom</span>

// ── Insight pills ─────────────────────────────────────────────────────────────
function Insights({s}){
  const wf=waterfall(s);
  const tvs=totVarSpent(s);
  const tvb=totVarBud(s);
  const varRem=tvb-tvs;
  const pills=[];

  if(wf.shortBy>0) pills.push({t:'bd',text:`Short by ${fmt(wf.shortBy)}`});
  else              pills.push({t:'gd',text:`${fmt(wf.surplus)} surplus`});

  if(varRem>0)  pills.push({t:'inf',text:`${fmt(Math.round(varRem/wLeft))}/wk left`});
  else if(varRem<0) pills.push({t:'bd',text:`Over ${fmt(-varRem)}`});

  if(wf.dVarAvail<wf.dVarBud) pills.push({t:'wn',text:`Debit ${fmt(wf.dVarAvail)} of ${fmt(wf.dVarBud)}`});
  if(wf.fixedPend>0)           pills.push({t:'wn',text:`${fmt(wf.fixedPend)} fixed pending`});
  if(!s.savings.done)          pills.push({t:'wn',text:'Savings pending'});

  const sbiUtil=pct(sbiSpent(s),s.accounts.sbi.limit);
  const yesUtil=pct(yesSpent(s),s.accounts.yes.limit);
  if(sbiUtil>75) pills.push({t:'wn',text:`SBI ${sbiUtil}% used`});
  if(yesUtil>75) pills.push({t:'wn',text:`YES ${yesUtil}% used`});

  const cb=(s.accounts.sbi.cashback||0)+(s.accounts.yes.cashback||0);
  if(cb>0) pills.push({t:'gd',text:`${fmt(cb)} cashback`});

  return <div className="pill-row">{pills.map((p,i)=><span key={i} className={`pill ${p.t}`}>{p.text}</span>)}</div>;
}

// BALANCES  — primary action screen, kept clean

function Balances({s,save,toast}){
  const [dv,setDv]=useState(String(s.accounts.debit.balance));
  const [sv,setSv]=useState(String(s.accounts.sbi.available));
  const [yv,setYv]=useState(String(s.accounts.yes.available));
  const [cv,setCv]=useState(String(s.cash||0));

  const dvN=dv===''?0:Number(dv);
  const svN=sv===''?0:Number(sv);
  const yvN=yv===''?0:Number(yv);
  const cvN=cv===''?0:Number(cv);

  const prev=useMemo(()=>({
    ...s,
    accounts:{debit:{balance:dvN},sbi:{...s.accounts.sbi,available:svN},yes:{...s.accounts.yes,available:yvN}},
    cash:cvN

  const wf=waterfall(prev);

  async function doSave(){
    setBusy(true);

      accounts:{debit:{balance:dvN},sbi:{...s.accounts.sbi,available:svN},yes:{...s.accounts.yes,available:yvN}}

        {/* Debit */}

          <div className="il">🏦 Debit Balance</div>
          <input type="number" value={dv} onChange={e=>setDv(e.target.value)} inputMode="numeric"/>
          <div style={{marginTop:5,display:'flex',flexDirection:'column',gap:2}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:'.7rem',color:'var(--muted)',fontFamily:'var(--mono)'}}>After bills</span>
              <span style={{fontSize:'.7rem',fontFamily:'var(--mono)',fontWeight:600,color:wf.afterBills<0?'var(--red)':wf.afterBills<5000?'var(--amber)':'var(--green)'}}>{fmt(wf.afterBills)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:'.7rem',color:'var(--muted)',fontFamily:'var(--mono)'}}>After fixed + savings</span>
              <span style={{fontSize:'.7rem',fontFamily:'var(--mono)',fontWeight:600,color:wf.afterSav<0?'var(--red)':'var(--muted)'}}>{fmt(wf.afterSav)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:'.7rem',color:'var(--muted)',fontFamily:'var(--mono)'}}>Debit var available</span>
              <span style={{fontSize:'.7rem',fontFamily:'var(--mono)',fontWeight:600,color:wf.dVarAvail<wf.dVarBud?'var(--amber)':'var(--green)'}}>{fmt(wf.dVarAvail)} of {fmt(wf.dVarBud)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',borderTop:'1px solid var(--border)',paddingTop:4,marginTop:2}}>
              <span style={{fontSize:'.7rem',color:'var(--muted)',fontFamily:'var(--mono)',fontWeight:600}}>{wf.shortBy>0?'Short by':'Surplus'}</span>
              <span style={{fontSize:'.75rem',fontFamily:'var(--mono)',fontWeight:700,color:wf.shortBy>0?'var(--red)':'var(--green)'}}>{fmt(wf.shortBy>0?wf.shortBy:wf.surplus)}</span>

        <hr/>
        {/* SBI */}
        <div className="mb">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <div className="il" style={{marginBottom:0}}>💳 SBI Available</div>
            <span style={{fontSize:'.65rem',color:'var(--muted)',fontFamily:'var(--mono)'}}>limit {fmt(s.accounts.sbi.limit)}</span>
          </div>

        <div><div className="il">YES Cashback</div>
          <input type="number" value={s.accounts.yes.cashback||0} inputMode="numeric"
            onChange={e=>save({...s,accounts:{...s.accounts,yes:{...s.accounts.yes,cashback:Number(e.target.value)}}})}/>
        </div>
      </div>

      <div className="sh">Savings target</div>
      <div className="card mb">
        <div className="il">Monthly Savings</div>
        <input type="number" value={s.savings.budget} inputMode="numeric" onChange={e=>save({...s,savings:{...s.savings,budget:Number(e.target.value)}})}/>
      </div>

      <div className="sh">Credit limits</div>
      <div className="card gap mb">
        <div><div className="il">SBI Credit Limit</div>
          <input type="number" value={s.accounts.sbi.limit} inputMode="numeric" onChange={e=>save({...s,accounts:{...s.accounts,sbi:{...s.accounts.sbi,limit:Number(e.target.value)}}})}/>
        </div>
        <div><div className="il">YES RuPay Limit</div>
          <input type="number" value={s.accounts.yes.limit} inputMode="numeric" onChange={e=>save({...s,accounts:{...s.accounts,yes:{...s.accounts.yes,limit:Number(e.target.value)}}})}/>
        </div>
      </div>

      <div className="sh" style={{color:'var(--red)'}}>Danger</div>
      <button className="btn" style={{background:'var(--red-bg)',color:'var(--red)',border:'1px solid var(--red-bd)'}}
        onClick={()=>{if(confirm('Reset ALL data?'))save(JSON.parse(JSON.stringify(DEFAULT))).then(()=>toast('Reset'))}}>
        Reset to defaults
      </button>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const [state,setState]=useState(null);
  const [page,setPage]=useState('overview');
  const [tmsg,setTmsg]=useState('');
  const timer=useRef(null);

  function toast(msg){setTmsg(msg);if(timer.current)clearTimeout(timer.current);timer.current=setTimeout(()=>setTmsg(''),2200)}

  function deepMerge(def,saved){
    const r={...def};
    for(const k in saved){
      if(k in r&&typeof r[k]==='object'&&!Array.isArray(r[k])&&r[k]!==null) r[k]=deepMerge(r[k],saved[k]);
      else r[k]=saved[k];
    }
    return r;
  }

  useEffect(()=>{
    (async()=>{
      const {data}=await db.from('budget_state').select('data').eq('id','main').single();
      if(data?.data){
        const merged=deepMerge(JSON.parse(JSON.stringify(DEFAULT)),data.data);
        setState(migrate(merged));
      } else {
        setState(JSON.parse(JSON.stringify(DEFAULT)));
      }
    })();
  },[]);

  const save=useCallback(async ns=>{
    setState(ns);
    await db.from('budget_state').upsert({id:'main',data:ns,updated_at:new Date().toISOString()});
  },[]);

  if(!state) return(
    <div className="loading">
      <div className="spinner"/>
      <div style={{fontSize:'.75rem',color:'var(--muted)',fontFamily:'var(--mono)'}}>Loading…</div>
    </div>
  );

  const nav=[
    {id:'overview',label:'Home',icon:<><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>},
    {id:'balances',label:'Balances',icon:<><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></>},
    {id:'expenses',label:'Expenses',icon:<><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>},
    {id:'savings',label:'Debts',icon:<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>},
    {id:'settings',label:'Settings',icon:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>},
  ];

  return(
    <>
      {page==='overview'&&<Overview s={state}/>}
      {page==='balances'&&<Balances s={state} save={save} toast={toast}/>}
      {page==='expenses'&&<Expenses s={state} save={save} toast={toast}/>}
      {page==='savings' &&<SavingsDebts s={state} save={save} toast={toast}/>}
      {page==='settings'&&<Settings s={state} save={save} toast={toast}/>}
      <nav className="nav">
        {nav.map(n=>(
          <button key={n.id} className={`nb ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}>
            <svg viewBox="0 0 24 24">{n.icon}</svg>
            {n.label}
          </button>
        ))}
      </nav>
      <Toast msg={tmsg}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
