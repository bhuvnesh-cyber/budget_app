<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#F0F4FF"/>
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#F0F4FF; --surface:#ffffff; --surface2:#F7F9FF; --border:#E4E9F5;
  --text:#0F172A; --muted:#64748B; --subtle:#94A3B8;
  --accent:#6366F1; --accent-soft:#EEF2FF; --accent-bd:#C7D2FE;
  --green:#10B981; --green-bg:#ECFDF5; --green-bd:#A7F3D0;
  --red:#EF4444; --red-bg:#FEF2F2; --red-bd:#FECACA;
  --amber:#F59E0B; --amber-bg:#FFFBEB; --amber-bd:#FDE68A;
  --blue:#3B82F6; --blue-bg:#EFF6FF; --blue-bd:#BFDBFE;
  --nav-h:68px; --safe-b:env(safe-area-inset-bottom,0px);
  --r:18px; --rs:12px; --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  --shadow:0 2px 12px rgba(99,102,241,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
#root{display:flex;flex-direction:column;min-height:100%}
.page{flex:1;padding:0.8rem 1rem calc(var(--nav-h) + var(--safe-b) + 1rem);max-width:600px;margin:0 auto;width:100%}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:var(--safe-b);box-shadow:0 -4px 20px rgba(99,102,241,.06)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px 6px;gap:4px;background:none;border:none;cursor:pointer;
  color:var(--subtle);font-family:var(--sans);font-size:.58rem;font-weight:600;
  letter-spacing:.03em;text-transform:uppercase;transition:all .2s;min-height:60px}
.nb.on{color:var(--accent)}
.nb svg{width:22px;height:22px;stroke-width:2;fill:none;stroke:currentColor;transition:stroke .2s}
.nb-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .2s;margin-top:-2px}
.nb.on .nb-dot{opacity:1}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;box-shadow:var(--shadow)}
.cl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--subtle);margin-bottom:.25rem;font-weight:600}
.cv{font-size:1.45rem;font-weight:800;line-height:1.1;font-family:var(--mono);letter-spacing:-.02em}
.cs{font-size:.65rem;color:var(--muted);margin-top:.25rem;font-family:var(--mono)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin-bottom:.6rem}
.cg{color:var(--green)} .cr{color:var(--red)} .ca{color:var(--amber)} .cm{color:var(--muted)} .cb{color:var(--blue)}
.sh{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--subtle);
  font-weight:700;margin:1.4rem 0 .6rem;display:flex;align-items:center;gap:.5rem}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.ins{border-radius:12px;padding:.55rem .9rem;font-size:.75rem;margin-bottom:.4rem;line-height:1.5;font-weight:500}
.ins.gd{background:var(--green-bg);border:1px solid var(--green-bd);border-left:3px solid var(--green);color:#065F46}
.ins.wn{background:var(--amber-bg);border:1px solid var(--amber-bd);border-left:3px solid var(--amber);color:#78350F}
.ins.bd{background:var(--red-bg);border:1px solid var(--red-bd);border-left:3px solid var(--red);color:#7F1D1D}
.ins.inf{background:var(--accent-soft);border:1px solid var(--accent-bd);border-left:3px solid var(--accent);color:#3730A3}
.bw{background:#E2E8F0;border-radius:99px;height:5px;margin-top:7px;overflow:hidden}
.bf{height:5px;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:.6rem;font-weight:600;letter-spacing:.02em}
.bg{background:#D1FAE5;color:#065F46} .br{background:#FEE2E2;color:#7F1D1D}
.ba{background:#FEF3C7;color:#78350F} .bm{background:#F1F5F9;color:#64748B}
input[type=number],input[type=text]{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);
  border-radius:var(--rs);font-family:var(--mono);font-size:.9rem;font-weight:500;
  padding:.65rem .9rem;outline:none;appearance:none;-moz-appearance:textfield;transition:border-color .15s}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.12);background:var(--surface)}
input::placeholder{color:var(--subtle)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:.7rem 1.2rem;border-radius:var(--rs);border:none;cursor:pointer;
  font-family:var(--sans);font-weight:700;font-size:.9rem;transition:all .15s;width:100%}
.bp{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.bp:active{transform:scale(.97)}
.bs{background:var(--surface);border:1.5px solid var(--border);color:var(--muted)}
.bdng{background:none;border:none;cursor:pointer;padding:4px;color:var(--red);font-size:.9rem}
.trow{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid var(--border)}
.trow:last-child{border-bottom:none}
.tgl{position:relative;width:46px;height:27px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#CBD5E1;border-radius:14px;cursor:pointer;transition:.25s}
.tsl:before{content:'';position:absolute;width:21px;height:21px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.25s;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.tgl input:checked+.tsl{background:linear-gradient(135deg,#6366F1,#8B5CF6)}
.tgl input:checked+.tsl:before{transform:translateX(19px)}
.er{padding:.8rem 0;border-bottom:1px solid var(--border)}
.er:last-child{border-bottom:none}
.eh{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.en{font-size:.92rem;font-weight:600;display:flex;align-items:center;gap:6px}
.chip{font-size:.58rem;padding:2px 7px;border-radius:99px;font-weight:600}
.cs_{background:#DBEAFE;color:#1D4ED8} .cy{background:#EDE9FE;color:#7C3AED} .cd{background:#F1F5F9;color:#475569}
.ah{display:flex;align-items:flex-start;justify-content:space-between;padding:1rem 0 .5rem}
.at{font-size:1.6rem;font-weight:800;line-height:1;letter-spacing:-.02em}
.ad{text-align:right;font-family:var(--mono);font-size:.68rem;color:var(--muted)}
.ad .dy{color:var(--accent);font-weight:600;margin-top:3px}
.sfh{background:var(--surface);border:2px solid var(--red);border-radius:var(--r);padding:1rem;box-shadow:0 4px 16px rgba(239,68,68,.1)}
.sfh.ok{border-color:var(--green);box-shadow:0 4px 16px rgba(16,185,129,.1)}

/* Short-by summary banner */
.summary-banner{border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:.8rem;border:1.5px solid}
.sb-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.78rem}
.sb-label{color:var(--muted);font-weight:500}
.sb-val{font-family:var(--mono);font-weight:700;font-size:.82rem}

/* Weekly card */
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.6rem;box-shadow:var(--shadow)}
.week-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.week-row:last-child{border-bottom:none}
.week-cat{font-size:.82rem;font-weight:600}
.week-amt{font-family:var(--mono);font-size:.82rem;font-weight:700}
.week-sub{font-size:.65rem;color:var(--muted);font-family:var(--mono)}

.tab-bar{display:flex;background:var(--surface2);border-radius:12px;padding:3px;margin-bottom:.9rem;gap:3px}
.tab{flex:1;padding:.45rem .8rem;border:none;border-radius:9px;cursor:pointer;
  font-family:var(--sans);font-size:.72rem;font-weight:600;letter-spacing:.02em;text-transform:uppercase;
  color:var(--muted);background:transparent;transition:all .2s}
.tab.on{color:var(--accent);background:var(--surface);box-shadow:var(--shadow)}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:1rem}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);left:50%;transform:translateX(-50%);
  background:#0F172A;color:#fff;padding:.65rem 1.4rem;border-radius:99px;
  font-family:var(--sans);font-size:.8rem;font-weight:600;z-index:200;
  animation:fu .2s cubic-bezier(.4,0,.2,1);white-space:nowrap}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
hr{border:none;border-top:1px solid var(--border);margin:.9rem 0}
.row{display:flex;align-items:center;gap:.6rem}
.f1{flex:1}
.mono{font-family:var(--mono)}
.sm{font-size:.75rem}
.il{font-size:.62rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.gap{display:flex;flex-direction:column;gap:.5rem}
.mb1{margin-bottom:.6rem}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo} = React;

const SUPA_URL = 'https://jyacewgyqvrqybeyrcig.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5YWNld2d5cXZycXliZXlyY2lnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzUxNTYsImV4cCI6MjA5MDk1MTE1Nn0.yMffM11nwBLiyd3-M4n-Fx5oVirCK4uojkLu2JLw5xU';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const WARN = 0.75;

const DEFAULT = {
  version: 3,
  base_budget: 83500,
  additional_income: [{source:'Bank Interest', amount:69}],
  fixed: [
    {category:'Family',         budget:15000, paid:true,  spent:15000},
    {category:'Rent',           budget:21500, paid:true,  spent:21500},
    {category:'Milk',           budget:2940,  paid:true,  spent:2940 },
    {category:'Rent_Furniture', budget:2994,  paid:true,  spent:2994 },
    {category:'School',         budget:3000,  paid:false, spent:0    },
    {category:'Recharge',       budget:1000,  paid:false, spent:0    },
    {category:'Gas',            budget:531,   paid:false, spent:0    },
    {category:'Electric',       budget:735,   paid:true,  spent:735  },
    {category:'WIFI',           budget:800,   paid:false, spent:0    },
  ],
  variable: [
    {category:'Instamart', budget:6000, card:'SBI'},
    {category:'Swiggy',    budget:1000, card:'SBI'},
    {category:'Amazon',    budget:3000, card:'SBI'},
    {category:'Other',     budget:8000, card:'YES'},
    {category:'Mall',      budget:4000, card:'Debit'},
    {category:'Clothes',   budget:2000, card:'Debit'},
    {category:'Doctor',    budget:1000, card:'Debit'},
  ],
  savings: {budget:10000, done:false},
  debts: [{name:'Credit Bill', amount:7932, paid:false}],
  accounts: {
    debit: {balance:83569},
    sbi:   {limit:20000, available:20000, cashback:0},
    yes:   {limit:51000, available:51000, cashback:0},
  },
  cash: 0,
};

function migrate(s) {
  if (!s.accounts?.sbi?.cashback) s.accounts.sbi.cashback = 0;
  if (!s.accounts?.yes?.cashback) s.accounts.yes.cashback = 0;
  if (s.cash === undefined) s.cash = 0;
  // remove old checkin_log if present
  delete s.checkin_log;
  s.version = 3;
  return s;
}

const today    = new Date();
const monthLbl = today.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
const lastDay  = new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
const daysLeft = Math.max(1, lastDay - today.getDate());
const wksLeft  = Math.max(1, Math.ceil(daysLeft / 7));

const fmt = n => '₹' + Math.round(n).toLocaleString('en-IN');

function barClr(sp,bud){const p=bud?sp/bud:0;return p>1?'#dc2626':p>WARN?'#d97706':'#16a34a'}
function badgeCls(sp,bud){if(!sp)return 'bm';if(sp>bud)return 'br';if(sp/bud>WARN)return 'ba';return 'bg'}
function badgeTxt(sp,bud){if(!sp)return 'not started';if(sp>bud)return `over ${fmt(sp-bud)}`;return `${fmt(bud-sp)} left`}

// ── Core aggregators ──────────────────────────────────────────────────────────
const totalIncome  = s => s.base_budget + s.additional_income.reduce((a,i)=>a+i.amount,0);
const paidFixed    = s => s.fixed.filter(f=>f.paid).reduce((a,f)=>a+f.spent,0);
const unpaidFixed  = s => s.fixed.filter(f=>!f.paid).reduce((a,f)=>a+f.budget,0);
const totVarBud    = s => s.variable.reduce((a,v)=>a+v.budget,0);
const totDebts     = s => s.debts.reduce((a,d)=>a+d.amount,0);
const paidDebts    = s => s.debts.filter(d=>d.paid).reduce((a,d)=>a+d.amount,0);

// ── Spend from balances (simple subtraction) ──────────────────────────────────
const sbiSpent  = s => Math.max(0, s.accounts.sbi.limit  - s.accounts.sbi.available  - (s.accounts.sbi.cashback||0));
const yesSpent  = s => Math.max(0, s.accounts.yes.limit  - s.accounts.yes.available  - (s.accounts.yes.cashback||0));

// Debit variable spent:
//   Step 1: debit balance - unpaid fixed = amount left for variable
//   Step 2: debit variable budget - step1 = how much of budget is already spent
//   If step1 >= debit var budget, nothing spent yet (surplus)
const debitVarBudget  = s => s.variable.filter(v=>v.card==='Debit').reduce((a,v)=>a+v.budget,0);
const debitAvailForVar= s => s.accounts.debit.balance - unpaidFixed(s);
const debitVarSpent   = s => Math.max(0, debitVarBudget(s) - debitAvailForVar(s));
const totalVarSpent   = s => sbiSpent(s) + yesSpent(s) + debitVarSpent(s);

// ── Distribute spend by budget ratio ─────────────────────────────────────────
function distributeByRatio(amount, categories) {
  const total = categories.reduce((a,c)=>a+c.budget,0);
  if (!total) return categories.map(c=>({...c, spent:0}));
  return categories.map(c=>({...c, spent: Math.round(amount * c.budget / total)}));
}

function varWithSpent(s) {
  const sbiCats  = s.variable.filter(v=>v.card==='SBI');
  const yesCats  = s.variable.filter(v=>v.card==='YES');
  const debitCats= s.variable.filter(v=>v.card==='Debit');
  const sbi  = distributeByRatio(sbiSpent(s),  sbiCats);
  const yes  = distributeByRatio(yesSpent(s),  yesCats);
  const dbt  = distributeByRatio(debitVarSpent(s), debitCats);
  return [...sbi, ...yes, ...dbt];
}

// ── Short-by logic ────────────────────────────────────────────────────────────
function calcShortBy(s) {
  const sbiBill     = sbiSpent(s);
  const yesBill     = yesSpent(s);
  const dvSpent     = debitVarSpent(s);
  const debitVarRem = Math.max(0, debitVarBudget(s) - dvSpent);
  const sbiVarRem   = Math.max(0, s.variable.filter(v=>v.card==='SBI').reduce((a,v)=>a+v.budget,0) - sbiBill);
  const yesVarRem   = Math.max(0, s.variable.filter(v=>v.card==='YES').reduce((a,v)=>a+v.budget,0) - yesBill);
  const unpaidDbt   = totDebts(s) - paidDebts(s);
  const savingsPend = s.savings.done ? 0 : s.savings.budget;
  // What debit still needs to cover:
  // unpaid fixed + savings pending + unpaid debts + debit var still to spend + credit card bills
  const needed = unpaidFixed(s) + savingsPend + unpaidDbt + debitVarRem + sbiBill + yesBill;
  const sb     = needed - s.accounts.debit.balance;
  return { sb, needed, sbiBill, yesBill, debitVarRem, sbiVarRem, yesVarRem, unpaidDbt, savingsPend };
}

// ── Mini components ───────────────────────────────────────────────────────────
function Bar({sp,bud}){const p=bud?Math.min(100,sp/bud*100):0;return<div className="bw"><div className="bf" style={{width:p+'%',background:barClr(sp,bud)}}/></div>}
function Tog({v,onChange}){return<label className="tgl"><input type="checkbox" checked={v} onChange={e=>onChange(e.target.checked)}/><span className="tsl"/></label>}
function Toast({msg}){return msg?<div className="toast">{msg}</div>:null}

// ── Short-by summary banner (used on overview) ────────────────────────────────
function ShortBySummary({s}) {
  const {sb, needed, sbiBill, yesBill, debitVarRem, sbiVarRem, yesVarRem, unpaidDbt, savingsPend} = calcShortBy(s);
  const isOk = sb <= 0;
  return (
    <div className="summary-banner" style={{
      background: isOk ? 'var(--green-bg)' : 'var(--red-bg)',
      borderColor: isOk ? 'var(--green)' : 'var(--red)',
      marginBottom:'.8rem'
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.5rem'}}>
        <div style={{fontSize:'.6rem',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:isOk?'#065F46':'#7F1D1D'}}>
          {isOk ? '✓ Debit Surplus' : '⚠ Debit Short By'}
        </div>
        <div style={{fontFamily:'var(--mono)',fontSize:'1.4rem',fontWeight:800,color:isOk?'var(--green)':'var(--red)'}}>
          {fmt(Math.abs(sb))}
        </div>
      </div>
      <div style={{borderTop:`1px solid ${isOk?'var(--green-bd)':'var(--red-bd)'}`,paddingTop:'.4rem',display:'flex',flexDirection:'column',gap:2}}>
        {unpaidFixed(s)>0 && <div className="sb-row"><span className="sb-label">Unpaid fixed</span><span className="sb-val cr">{fmt(unpaidFixed(s))}</span></div>}
        {savingsPend>0     && <div className="sb-row"><span className="sb-label">Savings pending</span><span className="sb-val ca">{fmt(savingsPend)}</span></div>}
        {unpaidDbt>0       && <div className="sb-row"><span className="sb-label">Debts unpaid</span><span className="sb-val cr">{fmt(unpaidDbt)}</span></div>}
        {sbiBill>0         && <div className="sb-row"><span className="sb-label">SBI bill to pay</span><span className="sb-val ca">{fmt(sbiBill)}</span></div>}
        {yesBill>0         && <div className="sb-row"><span className="sb-label">YES bill to pay</span><span className="sb-val ca">{fmt(yesBill)}</span></div>}
        {debitVarRem>0     && <div className="sb-row"><span className="sb-label">Debit var remaining</span><span className="sb-val cm">{fmt(debitVarRem)}</span></div>}
        <div className="sb-row" style={{borderTop:`1px solid ${isOk?'var(--green-bd)':'var(--red-bd)'}`,marginTop:3,paddingTop:4}}>
          <span className="sb-label" style={{fontWeight:700}}>Total needed</span>
          <span className="sb-val">{fmt(needed)}</span>
        </div>
        <div className="sb-row">
          <span className="sb-label" style={{fontWeight:700}}>Debit balance</span>
          <span className="sb-val">{fmt(s.accounts.debit.balance)}</span>
        </div>
        {s.cash>0 && <>
          <div className="sb-row"><span className="sb-label">Cash on hand</span><span className="sb-val cg">{fmt(s.cash)}</span></div>
          <div className="sb-row" style={{borderTop:`1px solid ${isOk?'var(--green-bd)':'var(--red-bd)'}`,marginTop:3,paddingTop:4}}>
            <span className="sb-label" style={{fontWeight:700}}>Final short (after cash)</span>
            <span className="sb-val" style={{color:sb-s.cash<=0?'var(--green)':'var(--red)'}}>{fmt(Math.abs(sb - s.cash))}</span>
          </div>
        </>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════════════════════════════════════════════
function Overview({s}) {
  const inc = totalIncome(s);
  const fp  = paidFixed(s);
  const tvs = totalVarSpent(s);
  const tvb = totVarBud(s);
  const varRem = tvb - tvs;
  const weeklyBudget = Math.round(varRem / wksLeft);
  const dailyBudget  = Math.round(varRem / daysLeft);
  const totalCashback = (s.accounts.sbi.cashback||0) + (s.accounts.yes.cashback||0);

  return (
    <div className="page">
      <div className="ah">
        <div>
          <div className="at">{monthLbl}</div>
          <div style={{fontSize:'.65rem',color:'var(--muted)',fontFamily:'var(--mono)',marginTop:4}}>budget tracker</div>
        </div>
        <div className="ad">
          <div>{today.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</div>
          <div className="dy">{wksLeft}w · {daysLeft}d left</div>
        </div>
      </div>

            <div className="cl">Per week (remaining)</div>

          </div>
          <div style={{textAlign:'right'}}>
            <div className="cl">Per day</div>
            <div style={{fontFamily:'var(--mono)',fontSize:'1.1rem',fontWeight:700,color:'var(--muted)'}}>{fmt(dailyBudget)}</div>
          </div>
        </div>
        {/* Per card weekly */}
        {['SBI','YES','Debit'].map(card=>{
          const cats = s.variable.filter(v=>v.card===card);

          const cardSpent = card==='SBI'?sbiSpent(s):card==='YES'?yesSpent(s):debitVarSpent(s);

          const bg = card==='SBI'?'#DBEAFE':card==='YES'?'#EDE9FE':'#F1F5F9';

        </div>

        </div>
        <div className="card">
          <div className="cl">YES</div>
          <div className="cv cm" style={{fontSize:'1.05rem'}}>{fmt(s.accounts.yes.available)}</div>
          <div className="cs">avail · {fmt(yesSpent(s))} spent</div>

      </div>

      <div className="sh">Insights</div>
      <div style={{display:'flex',flexDirection:'column',gap:'.4rem'}}>
        {varRem>0

// BALANCES (replaces check-in — just update current balances + cash)
// ══════════════════════════════════════════════════════════════════════════════
function Balances({s, save, toast}) {
  const [dv, setDv] = useState(String(s.accounts.debit.balance));
  const [sv, setSv] = useState(String(s.accounts.sbi.available));
  const [yv, setYv] = useState(String(s.accounts.yes.available));
  const [cv, setCv] = useState(String(s.cash||0));
  const [busy, setBusy] = useState(false);

  const dvN = dv===''?0:Number(dv);
  const svN = sv===''?0:Number(sv);
  const yvN = yv===''?0:Number(yv);
  const cvN = cv===''?0:Number(cv);

  // Live preview of what will be distributed
  const previewS = useMemo(()=>({
    ...s,
    accounts:{debit:{balance:dvN},sbi:{...s.accounts.sbi,available:svN},yes:{...s.accounts.yes,available:yvN}},
    cash:cvN
  }),[dvN,svN,yvN,cvN,s]);

  const newSbiSpent  = sbiSpent(previewS);
  const newYesSpent  = yesSpent(previewS);
  const newDebitSpent= debitVarSpent(previewS);
  const {sb} = calcShortBy(previewS);

  async function save_balances() {
    setBusy(true);
    await save({...s,
      cash: cvN,
      accounts:{
        debit:{balance:dvN},
        sbi:{...s.accounts.sbi, available:svN},
        yes:{...s.accounts.yes, available:yvN},
      }
    });
    toast('Balances updated');
    setBusy(false);
  }

  return (
    <div className="page">
      <div className="sh" style={{marginTop:'.4rem'}}>Update Balances</div>
      <div className="ins inf mb1">💡 Enter your current card balances. Spend is calculated automatically as <b>limit − available</b>.</div>

      <div className="card mb1">
        <div className="mb1">
          <div className="row mb1"><span style={{fontWeight:600}}>🏦 Debit Balance</span></div>
          <input type="number" value={dv} onChange={e=>setDv(e.target.value)} inputMode="numeric"/>
          <div style={{display:'flex',gap:8,marginTop:4,flexWrap:'wrap'}}>
            <span className="mono sm cm">avail for var: <b style={{color:'var(--accent)'}}>{fmt(debitAvailForVar(previewS))}</b> · var spent: <b style={{color: newDebitSpent>0?'var(--red)':'var(--green)'}}>{fmt(newDebitSpent)}</b></span>
          </div>
        </div>
        <hr/>
        <div className="mb1">
          <div className="row mb1"><span style={{fontWeight:600}}>💳 SBI Available</span><span className="mono sm cm" style={{marginLeft:'auto'}}>limit {fmt(s.accounts.sbi.limit)}</span></div>
          <input type="number" value={sv} onChange={e=>setSv(e.target.value)} inputMode="numeric"/>
          <div style={{marginTop:4}}><span className="mono sm ca">SBI spent: <b>{fmt(newSbiSpent)}</b></span></div>
        </div>
        <hr/>
        <div className="mb1">
          <div className="row mb1"><span style={{fontWeight:600}}>💳 YES Available</span><span className="mono sm cm" style={{marginLeft:'auto'}}>limit {fmt(s.accounts.yes.limit)}</span></div>
          <input type="number" value={yv} onChange={e=>setYv(e.target.value)} inputMode="numeric"/>
          <div style={{marginTop:4}}><span className="mono sm ca">YES spent: <b>{fmt(newYesSpent)}</b></span></div>
        </div>
        <hr/>
        <div>
          <div className="row mb1"><span style={{fontWeight:600}}>💵 Cash on Hand</span></div>
          <input type="number" value={cv} onChange={e=>setCv(e.target.value)} inputMode="numeric"/>
        </div>
      </div>

      {/* Live short-by preview */}
      <div style={{marginBottom:'.8rem'}}>
        <div className="sh" style={{marginTop:0}}>Live Preview</div>
        <ShortBySummary s={previewS}/>
      </div>

      {/* Distribution preview */}
      <div className="sh">How spend is distributed</div>
      <div className="card mb1">
        {['SBI','YES','Debit'].map(card=>{
          const spent = card==='SBI'?newSbiSpent:card==='YES'?newYesSpent:newDebitSpent;
          const cats  = distributeByRatio(spent, previewS.variable.filter(v=>v.card===card));
          if (!cats.length) return null;
          return (
            <div key={card} style={{marginBottom:'.5rem'}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                <span className={`chip ${card==='SBI'?'cs_':card==='YES'?'cy':'cd'}`}>{card}</span>
                <span className="mono sm" style={{fontWeight:700}}>{fmt(spent)} spent</span>
              </div>
              {cats.map(c=>(
                <div key={c.category} style={{display:'flex',justifyContent:'space-between',padding:'2px 0',paddingLeft:8}}>
                  <span className="sm" style={{color:'var(--muted)'}}>{c.category}</span>
                  <span className="mono sm">{fmt(c.spent)} <span style={{color:'var(--subtle)',fontSize:'.6rem'}}>({Math.round(c.budget/cats.reduce((a,x)=>a+x.budget,0)*100)}%)</span></span>
                </div>
              ))}
            </div>
          );
        })}
      </div>

      <button className="btn bp" onClick={save_balances} disabled={busy}>{busy?'Saving…':'✓ Save Balances'}</button>
    </div>
  );
}

// APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [state, setState] = useState(null);
  const [page,  setPage]  = useState('overview');
  const [tmsg,  setTmsg]  = useState('');
  const timer = useRef(null);

  function toast(msg){setTmsg(msg);if(timer.current)clearTimeout(timer.current);timer.current=setTimeout(()=>setTmsg(''),2500);}

  function deepMerge(def,saved){
    const r={...def};
    for(const k in saved){
      if(k in r&&typeof r[k]==='object'&&!Array.isArray(r[k])&&r[k]!==null) r[k]=deepMerge(r[k],saved[k]);
      else r[k]=saved[k];
    }
    return r;
  }

  useEffect(()=>{
    (async()=>{
      const {data}=await db.from('budget_state').select('data').eq('id','main').single();
      if (data?.data) {
        const merged = deepMerge(JSON.parse(JSON.stringify(DEFAULT)), data.data);
        setState(migrate(merged));
      } else {
        setState(JSON.parse(JSON.stringify(DEFAULT)));
      }
    })();
  },[]);

  const save = useCallback(async ns=>{
    setState(ns);
    await db.from('budget_state').upsert({id:'main',data:ns,updated_at:new Date().toISOString()});
  },[]);

  if (!state) return(
    <div className="loading">
      <div className="spinner"/>
      <div className="mono sm cm">Loading…</div>
    </div>
  );

  const nav = [
    {id:'overview', label:'Home',     icon:<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>},
    {id:'balances', label:'Balances', icon:<><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></>},
    {id:'expenses', label:'Expenses', icon:<><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>},
    {id:'savings',  label:'Debts',    icon:<><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>},
    {id:'settings', label:'Settings', icon:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>},
  ];

  return (
    <>
      {page==='overview' && <Overview       s={state}/>}
      {page==='balances' && <Balances        s={state} save={save} toast={toast}/>}
      {page==='expenses' && <Expenses        s={state} save={save} toast={toast}/>}
      {page==='savings'  && <SavingsDebts    s={state} save={save} toast={toast}/>}
      {page==='settings' && <Settings        s={state} save={save} toast={toast}/>}
      <nav className="nav">
        {nav.map(n=>(
          <button key={n.id} className={`nb ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">{n.icon}</svg>
            {n.label}
            <div className="nb-dot"/>
          </button>
        ))}
      </nav>
      <Toast msg={tmsg}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
