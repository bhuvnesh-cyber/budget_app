<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#F0F4FF"/>
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#F0F4FF; --surface:#ffffff; --surface2:#F7F9FF; --border:#E4E9F5;
  --text:#0F172A; --muted:#64748B; --subtle:#94A3B8;
  --accent:#6366F1; --accent-soft:#EEF2FF; --accent-bd:#C7D2FE;
  --green:#10B981; --green-bg:#ECFDF5; --green-bd:#A7F3D0;
  --red:#EF4444;   --red-bg:#FEF2F2;   --red-bd:#FECACA;
  --amber:#F59E0B; --amber-bg:#FFFBEB; --amber-bd:#FDE68A;
  --blue:#3B82F6;  --blue-bg:#EFF6FF;  --blue-bd:#BFDBFE;
  --nav-h:68px; --safe-b:env(safe-area-inset-bottom,0px);
  --r:18px; --rs:12px; --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  --shadow:0 2px 12px rgba(99,102,241,.08); --shadow-lg:0 8px 32px rgba(99,102,241,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
#root{display:flex;flex-direction:column;min-height:100%}
.page{flex:1;padding:0.8rem 1rem calc(var(--nav-h) + var(--safe-b) + 1rem);max-width:600px;margin:0 auto;width:100%}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:var(--safe-b);box-shadow:0 -1px 0 var(--border),0 -8px 32px rgba(99,102,241,.06)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px 6px;gap:4px;background:none;border:none;cursor:pointer;
  color:var(--subtle);font-family:var(--sans);font-size:.58rem;font-weight:600;
  letter-spacing:.03em;text-transform:uppercase;transition:all .2s;min-height:60px}
.nb.on{color:var(--accent)}
.nb.on svg{stroke:var(--accent)}
.nb svg{width:22px;height:22px;stroke-width:2;fill:none;stroke:currentColor;transition:stroke .2s}
.nb-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .2s;margin-top:-2px}
.nb.on .nb-dot{opacity:1}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:.9rem 1rem;box-shadow:var(--shadow)}
.cl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--subtle);
  margin-bottom:.25rem;font-family:var(--sans);font-weight:600}
.cv{font-size:1.45rem;font-weight:800;line-height:1.1;font-family:var(--mono);letter-spacing:-.02em}
.cs{font-size:.65rem;color:var(--muted);margin-top:.25rem;font-family:var(--mono)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin-bottom:.6rem}

/* Colors */
.cg{color:var(--green)} .cr{color:var(--red)} .ca{color:var(--amber)} .cm{color:var(--muted)} .cb{color:var(--blue)} .cv-accent{color:var(--accent)}

/* Section head */
.sh{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--subtle);
  font-family:var(--sans);font-weight:700;margin:1.4rem 0 .6rem;
  display:flex;align-items:center;gap:.5rem}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}

/* Insight */
.ins{border-radius:12px;padding:.55rem .9rem;font-size:.75rem;font-family:var(--sans);
  margin-bottom:.4rem;line-height:1.5;font-weight:500}
.ins.gd{background:var(--green-bg);border:1px solid var(--green-bd);border-left:3px solid var(--green);color:#065F46}
.ins.wn{background:var(--amber-bg);border:1px solid var(--amber-bd);border-left:3px solid var(--amber);color:#78350F}
.ins.bd{background:var(--red-bg);border:1px solid var(--red-bd);border-left:3px solid var(--red);color:#7F1D1D}
.ins.inf{background:var(--accent-soft);border:1px solid var(--accent-bd);border-left:3px solid var(--accent);color:#3730A3}

/* Bar */
.bw{background:#E2E8F0;border-radius:99px;height:5px;margin-top:7px;overflow:hidden}
.bf{height:5px;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:.6rem;font-family:var(--sans);font-weight:600;letter-spacing:.02em}
.bg{background:#D1FAE5;color:#065F46}
.br{background:#FEE2E2;color:#7F1D1D}
.ba{background:#FEF3C7;color:#78350F}
.bm{background:#F1F5F9;color:#64748B}

/* Inputs */
input[type=number],input[type=text]{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);
  border-radius:var(--rs);font-family:var(--mono);font-size:.9rem;font-weight:500;
  padding:.65rem .9rem;outline:none;appearance:none;-moz-appearance:textfield;
  transition:border-color .15s,box-shadow .15s}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.12);background:var(--surface)}
input::placeholder{color:var(--subtle)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:.7rem 1.2rem;border-radius:var(--rs);border:none;cursor:pointer;
  font-family:var(--sans);font-weight:700;font-size:.9rem;transition:all .15s;width:100%;letter-spacing:.01em}
.bp{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.bp:active{transform:scale(.97);box-shadow:0 2px 8px rgba(99,102,241,.25)}
.bs{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);box-shadow:var(--shadow)}
.bs:active{transform:scale(.97)}
.bdng{background:none;border:none;cursor:pointer;padding:4px;color:var(--red);font-size:.9rem}

/* Toggle */
.trow{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid var(--border)}
.trow:last-child{border-bottom:none}
.tgl{position:relative;width:46px;height:27px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#CBD5E1;border-radius:14px;cursor:pointer;transition:.25s}
.tsl:before{content:'';position:absolute;width:21px;height:21px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.25s;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.tgl input:checked+.tsl{background:linear-gradient(135deg,#6366F1,#8B5CF6)}
.tgl input:checked+.tsl:before{transform:translateX(19px)}

/* Predicted box */
.pb{background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border:1px solid var(--green-bd);
  border-radius:var(--r);padding:1.1rem 1rem;margin-bottom:.8rem;box-shadow:0 2px 12px rgba(16,185,129,.08)}
.pl{font-size:.6rem;color:var(--green);font-family:var(--sans);font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:.25rem}
.pv{font-size:1.6rem;font-weight:800;font-family:var(--mono);color:#065F46;letter-spacing:-.02em}
.ps{font-size:.65rem;color:#34D399;font-family:var(--mono);margin-top:.25rem;line-height:1.6}

/* Log */
.le{display:flex;align-items:center;gap:.6rem;padding:.75rem 1rem;
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  margin-bottom:.4rem;box-shadow:var(--shadow)}
.lp{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.lpi{font-size:.62rem;padding:3px 8px;border-radius:99px;font-family:var(--sans);font-weight:600}
.ld{background:#F1F5F9;color:#475569} .ls{background:#DBEAFE;color:#1D4ED8} .ly{background:#EDE9FE;color:#6D28D9}

/* Expense row */
.er{padding:.8rem 0;border-bottom:1px solid var(--border)}
.er:last-child{border-bottom:none}
.eh{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.en{font-size:.92rem;font-weight:600;display:flex;align-items:center;gap:6px;color:var(--text)}
.chip{font-size:.58rem;padding:2px 7px;border-radius:99px;font-family:var(--sans);font-weight:600}
.cs_{background:#DBEAFE;color:#1D4ED8} .cy{background:#EDE9FE;color:#7C3AED} .cd{background:#F1F5F9;color:#475569}

/* Header */
.ah{display:flex;align-items:flex-start;justify-content:space-between;padding:1rem 0 .5rem}
.at{font-size:1.6rem;font-weight:800;line-height:1;letter-spacing:-.02em;color:var(--text)}
.ad{text-align:right;font-family:var(--mono);font-size:.68rem;color:var(--muted)}
.ad .dy{color:var(--accent);font-weight:600;margin-top:3px}

/* Suf card */
.sfh{background:var(--surface);border:2px solid var(--red);border-radius:var(--r);
  padding:1rem;box-shadow:0 4px 16px rgba(239,68,68,.1)}
.sfh.ok{border-color:var(--green);box-shadow:0 4px 16px rgba(16,185,129,.1)}

/* Split preview box */
.split-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);
  padding:.6rem .9rem;margin-bottom:.6rem;font-size:.72rem;line-height:1.7}
.split-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.split-card{font-weight:700;font-family:var(--mono)}
.split-cats{color:var(--muted);font-size:.65rem}

/* Misc */
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:1rem}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);left:50%;transform:translateX(-50%);
  background:#0F172A;color:#fff;padding:.65rem 1.4rem;border-radius:99px;
  font-family:var(--sans);font-size:.8rem;font-weight:600;z-index:200;
  animation:fu .2s cubic-bezier(.4,0,.2,1);white-space:nowrap;box-shadow:0 8px 24px rgba(15,23,42,.25)}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
hr{border:none;border-top:1px solid var(--border);margin:.9rem 0}
.row{display:flex;align-items:center;gap:.6rem}
.f1{flex:1}
.mono{font-family:var(--mono)}
.sm{font-size:.75rem}
.il{font-size:.62rem;color:var(--muted);font-family:var(--sans);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.gap{display:flex;flex-direction:column;gap:.5rem}
.mb1{margin-bottom:.6rem}
.tab-bar{display:flex;background:var(--surface2);border-radius:12px;padding:3px;margin-bottom:.9rem;gap:3px}
.tab{flex:1;padding:.45rem .8rem;border:none;border-radius:9px;cursor:pointer;
  font-family:var(--sans);font-size:.72rem;font-weight:600;letter-spacing:.02em;text-transform:uppercase;
  color:var(--muted);background:transparent;transition:all .2s}
.tab.on{color:var(--accent);background:var(--surface);box-shadow:var(--shadow)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo} = React;

const SUPA_URL = 'https://jyacewgyqvrqybeyrcig.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5YWNld2d5cXZycXliZXlyY2lnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzUxNTYsImV4cCI6MjA5MDk1MTE1Nn0.yMffM11nwBLiyd3-M4n-Fx5oVirCK4uojkLu2JLw5xU';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── Constants (no more magic numbers) ────────────────────────────────────────
const CURRENT_VERSION  = 2;
const WARN_RATIO       = 0.70;  // amber warning threshold for bar/badge
const CREDIT_LOW_RATIO = 0.15;  // alert when credit available < 15% of limit

const DEFAULT = {
  version: CURRENT_VERSION,
  base_budget: 83500,
  additional_income: [{source:'Bank Interest', amount:69}],
  fixed: [
    {category:'Family',         budget:15000, paid:true,  spent:15000},
    {category:'Rent',           budget:21500, paid:true,  spent:21500},
    {category:'Milk',           budget:2940,  paid:true,  spent:2940 },
    {category:'Rent_Furniture', budget:2994,  paid:true,  spent:2994 },
    {category:'School',         budget:3000,  paid:false, spent:0    },
    {category:'Recharge',       budget:1000,  paid:false, spent:0    },
    {category:'Gas',            budget:531,   paid:false, spent:0    },
    {category:'Electric',       budget:735,   paid:true,  spent:735  },
    {category:'WIFI',           budget:800,   paid:false, spent:0    },
  ],
  variable: [
    {category:'Instamart', budget:6000, card:'SBI'},
    {category:'Swiggy',    budget:1000, card:'SBI'},
    {category:'Amazon',    budget:3000, card:'SBI'},
    {category:'Other',     budget:8000, card:'YES'},
    {category:'Mall',      budget:4000, card:'Debit'},
    {category:'Clothes',   budget:2000, card:'Debit'},
    {category:'Doctor',    budget:1000, card:'Debit'},
  ],
  savings: {budget:10000, done:false},
  debts: [{name:'Credit Bill', amount:7932, paid:false}],
  checkin_log: [],
  accounts: {
    debit: {balance:83569},
    sbi:   {limit:20000, available:20000, cashback:0},
    yes:   {limit:51000, available:51000, cashback:0},
  },
};

// ── Migration: old state → v2 ─────────────────────────────────────────────────
function migrate(saved) {
  const v = saved.version || 1;
  if (v < 2) {
    // Add cashback fields if missing
    if (saved.accounts?.sbi && saved.accounts.sbi.cashback === undefined)
      saved.accounts.sbi.cashback = 0;
    if (saved.accounts?.yes && saved.accounts.yes.cashback === undefined)
      saved.accounts.yes.cashback = 0;
    saved.version = 2;
  }
  return saved;
}

// ── Date helpers ──────────────────────────────────────────────────────────────
const today   = new Date();
const monthLbl = today.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
const lastDay  = new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
const daysLeft = Math.max(1,lastDay-today.getDate());
const wksLeft  = Math.max(1,Math.ceil(daysLeft/7));

function getCurrentWeekBounds() {
  const now = new Date();
  const dow = now.getDay();
  const diffToMon = (dow === 0 ? -6 : 1 - dow);
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() + diffToMon);
  weekStart.setHours(0,0,0,0);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);
  weekEnd.setHours(23,59,59,999);
  return {weekStart, weekEnd};
}

// ── Utility ───────────────────────────────────────────────────────────────────
const fmt = n => '₹' + Math.round(n).toLocaleString('en-IN');

function barClr(sp, bud) {
  const p = bud ? sp/bud : 0;
  return p > 1 ? '#dc2626' : p > WARN_RATIO ? '#d97706' : '#16a34a';
}
function badgeCls(sp, bud) {
  if (!sp) return 'bm';
  if (sp > bud) return 'br';
  if (sp/bud > WARN_RATIO) return 'ba';
  return 'bg';
}
function badgeTxt(sp, bud) {
  if (!sp) return 'not started';
  if (sp > bud) return `over ${fmt(sp-bud)}`;
  return `${fmt(bud-sp)} left`;
}

// ── Pure aggregators ──────────────────────────────────────────────────────────
const income      = s => s.base_budget + s.additional_income.reduce((a,i)=>a+i.amount,0);
const paidFix     = s => s.fixed.filter(f=>f.paid).reduce((a,f)=>a+f.spent,0);
const unpaidFix   = s => s.fixed.filter(f=>!f.paid).reduce((a,f)=>a+f.budget,0);
const totVarBud   = s => s.variable.reduce((a,v)=>a+v.budget,0);
const totDebts    = s => s.debts.reduce((a,d)=>a+d.amount,0);
const paidDbt     = s => s.debts.filter(d=>d.paid).reduce((a,d)=>a+d.amount,0);
const vCard       = (s,c) => s.checkin_log.reduce((a,e)=>a+(e[c.toLowerCase()]||0),0);
const vCat        = (s,c) => s.checkin_log.reduce((a,e)=>a+((e.cats||{})[c]||0),0);
const totVarSpent = s => vCard(s,'debit')+vCard(s,'sbi')+vCard(s,'yes');
const predDebit   = s => income(s)-paidFix(s)-(s.savings.done?s.savings.budget:0)-paidDbt(s)-vCard(s,'debit');

// ── Named helper fns for shortBy logic (replaces one big opaque fn) ───────────
// How much credit has already been billed (limit - available), minus any cashback
function creditBillOwed(s) {
  const sbi = (s.accounts.sbi.limit - s.accounts.sbi.available) - (s.accounts.sbi.cashback||0);
  const yes = (s.accounts.yes.limit - s.accounts.yes.available) - (s.accounts.yes.cashback||0);
  return { sbi: Math.max(0,sbi), yes: Math.max(0,yes) };
}

// How much budget still remains per card, from variable categories
function varRemByCard(s) {
  const rem = (card) => s.variable
    .filter(v=>v.card===card)
    .reduce((a,v)=>a+Math.max(0,v.budget-vCat(s,v.category)),0);
  return { debit: rem('Debit'), sbi: rem('SBI'), yes: rem('YES') };
}

// Total still to spend this month (all obligations not yet paid)
function stillToSpend(s) {
  const allVarRem = totVarBud(s) - totVarSpent(s); // honours over-spend correctly
  return unpaidFix(s) + allVarRem + (totDebts(s) - paidDbt(s));
}

// Debit balance after settling already-accrued credit bills
function debitNet(s) {
  const {sbi, yes} = creditBillOwed(s);
  return s.accounts.debit.balance - sbi - yes;
}

// Positive = short, negative = surplus
function shortfall(s) {
  return stillToSpend(s) - debitNet(s);
}

// Convenience bundle used by components
function shortBy(s) {
  const {sbi:sc, yes:yc} = creditBillOwed(s);
  const {debit:dr, sbi:sr, yes:yr} = varRemByCard(s);
  const allVarRem = totVarBud(s) - totVarSpent(s);
  const needed    = stillToSpend(s);
  const debitAfterCreditBills = debitNet(s);
  const sb        = shortfall(s);
  return {needed, sb, sc, yc, sr, yr, dr, allVarRem, stillToSpend:needed, debitAfterCreditBills};
}

// ── Mini components ───────────────────────────────────────────────────────────
function Bar({sp,bud}){const p=bud?Math.min(100,sp/bud*100):0;return<div className="bw"><div className="bf" style={{width:p+'%',background:barClr(sp,bud)}}/></div>}
function Tog({v,onChange}){return<label className="tgl"><input type="checkbox" checked={v} onChange={e=>onChange(e.target.checked)}/><span className="tsl"/></label>}
function Toast({msg}){return msg?<div className="toast">{msg}</div>:null}

// ── Split preview: shows how a check-in will be distributed ──────────────────
function SplitPreview({ds, ss, ys, s}) {
  // Build the same distribution logic as log(), but just for display
  const currentCats = {};
  s.checkin_log.forEach(e=>{ Object.entries(e.cats||{}).forEach(([c,v])=>{ currentCats[c]=(currentCats[c]||0)+v; }); });

  function distribute(amount, cardName) {
    const all = s.variable.filter(v=>v.card===cardName);
    const withBudget = all.filter(v=>(currentCats[v.category]||0) < v.budget);
    const targets = withBudget.length > 0 ? withBudget : all;
    return targets.map(v=>({cat:v.category, amt:Math.round(amount/targets.length)}));
  }

  const rows = [];
  if (ss > 0) rows.push({card:'SBI', amt:ss, cats:distribute(ss,'SBI'), cls:'ls'});
  if (ys > 0) rows.push({card:'YES', amt:ys, cats:distribute(ys,'YES'), cls:'ly'});
  if (ds > 0) rows.push({card:'Debit', amt:ds, cats:distribute(ds,'Debit'), cls:'ld'});

  if (!rows.length) return null;
  return (
    <div className="split-preview">
      <div style={{fontSize:'.6rem',fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>
        How this will be logged
      </div>
      {rows.map(r=>(
        <div key={r.card} className="split-row">
          <span className={`lpi ${r.cls}`} style={{marginRight:8}}>{r.card} {fmt(r.amt)}</span>
          <span className="split-cats">→ {r.cats.map(c=>`${c.cat} ${fmt(c.amt)}`).join(' · ')}</span>
        </div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════════════════════════════════════════════
function Overview({s}) {
  const sb_data = useMemo(()=>shortBy(s), [s]);
  const {sb, needed} = sb_data;
  const inc=income(s), fp=paidFix(s), vs=totVarSpent(s), sv=s.savings.done?s.savings.budget:0, dp=paidDbt(s);
  const rem=inc-fp-vs-sv-dp, pred=predDebit(s), act=s.accounts.debit.balance;
  const gap=act-pred, gth=Math.max(500,inc*.01), vr=totVarBud(s)-vs;

  const {weekStart,weekEnd}=getCurrentWeekBounds();
  const recentLogs=s.checkin_log.filter(e=>{try{const d=new Date(e.ts);return d>=weekStart&&d<=weekEnd;}catch{return false;}});
  const weekDebit=recentLogs.reduce((a,e)=>a+(e.debit||0),0);
  const weekSBI=recentLogs.reduce((a,e)=>a+(e.sbi||0),0);
  const weekYES=recentLogs.reduce((a,e)=>a+(e.yes||0),0);
  const weekTotal=weekDebit+weekSBI+weekYES;
  const hasWeekData=s.checkin_log.length>0;
  const weeklyBudget=Math.round(vr/wksLeft);
  const weeklyDiff=weekTotal-weeklyBudget;
  const wkFmt=d=>d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  const weekLabel=`${wkFmt(weekStart)} – ${wkFmt(weekEnd)}`;

  // Total cashback earned
  const totalCashback=(s.accounts.sbi.cashback||0)+(s.accounts.yes.cashback||0);

  return(
    <div className="page">
      <div className="ah">
        <div><div className="at">{monthLbl}</div><div style={{fontSize:'.65rem',color:'var(--muted)',fontFamily:'var(--mono)',marginTop:4}}>budget tracker</div></div>
        <div className="ad"><div>{today.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</div><div className="dy">{wksLeft}w · {daysLeft}d left</div></div>
      </div>

      <div className="g2">
        <div className="card"><div className="cl">Total Budget</div><div className="cv">{fmt(inc)}</div><div className="cs">base {fmt(s.base_budget)}</div></div>
        <div className="card"><div className="cl">Remaining</div><div className={`cv ${rem>=0?'cg':'cr'}`}>{fmt(rem)}</div><div className="cs">actual so far</div></div>
        <div className="card"><div className="cl">Fixed Paid</div><div className="cv cm">{fmt(fp)}</div><div className="cs">{fmt(unpaidFix(s))} pending</div></div>
        <div className="card"><div className="cl">Variable Spent</div><div className={`cv ${vs>totVarBud(s)*WARN_RATIO?'ca':'cm'}`}>{fmt(vs)}</div><div className="cs">of {fmt(totVarBud(s))}</div></div>
      </div>

      {totalCashback>0&&(
        <div className="ins gd mb1">🎁 <b>{fmt(totalCashback)}</b> cashback earned this month — applied to credit bills</div>
      )}

      <div className={`sfh mb1 ${sb<=0?'ok':''}`}>
        <div className="cl">{sb>0?'⚠ Debit Short By':'✓ Debit Surplus'}</div>
        <div className={`cv ${sb>0?'cr':'cg'}`}>{fmt(Math.abs(sb))}</div>
        <div className="cs">{sb>0?'debit won\'t cover all obligations':'debit covers all obligations'}</div>
      </div>

      <div className="sh">Insights</div>
      <div className="gap">
        {vr>0?<div className="ins gd">📅 <b>{fmt(vr)}</b> variable left · {wksLeft}w → <b>{fmt(vr/wksLeft)}/week</b> · <b>{fmt(vr/daysLeft)}/day</b></div>
             :<div className="ins bd">🚨 Variable budget exhausted — <b>{fmt(Math.abs(vr))}</b> over</div>}
        {Math.abs(gap)<gth?<div className="ins gd">✅ Debit <b>{fmt(act)}</b> matches predicted <b>{fmt(pred)}</b></div>
          :gap<0?<div className="ins wn">⚠️ Debit <b>{fmt(Math.abs(gap))} lower</b> than predicted {fmt(pred)}</div>
                :<div className="ins inf">💰 Debit <b>{fmt(gap)} higher</b> than predicted — payments pending</div>}
        {unpaidFix(s)>0&&<div className="ins wn">🔔 <b>{fmt(unpaidFix(s))}</b> in fixed expenses unpaid</div>}
        {totDebts(s)-paidDbt(s)>0&&<div className="ins wn">🔔 <b>{fmt(totDebts(s)-paidDbt(s))}</b> in debts unpaid</div>}
        {s.accounts.sbi.available<s.accounts.sbi.limit*CREDIT_LOW_RATIO&&<div className="ins wn">💳 SBI low — <b>{fmt(s.accounts.sbi.available)}</b> left</div>}
        {s.accounts.yes.available<s.accounts.yes.limit*CREDIT_LOW_RATIO&&<div className="ins wn">💳 YES low — <b>{fmt(s.accounts.yes.available)}</b> left</div>}
      </div>

      <div className="sh">Accounts</div>
      <div className="g3">
        <div className="card"><div className="cl">Debit</div><div className={`cv ${Math.abs(act-pred)<gth?'cg':'cr'}`} style={{fontSize:'1.05rem'}}>{fmt(act)}</div><div className="cs">pred {fmt(pred)}</div></div>
        <div className="card"><div className="cl">SBI</div><div className="cv cm" style={{fontSize:'1.05rem'}}>{fmt(s.accounts.sbi.available)}</div><div className="cs">avail{(s.accounts.sbi.cashback||0)>0?` · cb ${fmt(s.accounts.sbi.cashback)}`:''}</div></div>
        <div className="card"><div className="cl">YES</div><div className="cv cm" style={{fontSize:'1.05rem'}}>{fmt(s.accounts.yes.available)}</div><div className="cs">avail{(s.accounts.yes.cashback||0)>0?` · cb ${fmt(s.accounts.yes.cashback)}`:''}</div></div>
      </div>

      {hasWeekData&&<>
        <div className="sh">This Week's Spending</div>
        {weekTotal===0
          ?<div className="ins inf">📋 No check-ins this week ({weekLabel})<br/><span style={{opacity:.8}}>Expected: <b>{fmt(weeklyBudget)}</b></span></div>
          :<div className="card" style={{marginBottom:'.6rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.5rem'}}>
              <div><div className="cl">This Week</div><div className="cv" style={{fontSize:'1.25rem'}}>{fmt(weekTotal)}</div></div>
              <div style={{fontSize:'0.6rem',fontFamily:'var(--mono)',color:'var(--muted)',textAlign:'right'}}>
                <div>{weekLabel}</div><div style={{color:'var(--accent)',fontWeight:600,marginTop:2}}>{recentLogs.length} check-in{recentLogs.length!==1?'s':''}</div>
              </div>
            </div>
            <div style={{background:'var(--surface2)',borderRadius:10,padding:'.5rem .7rem',marginBottom:'.5rem'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:'.6rem',fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>vs weekly budget</span>
                <span style={{fontFamily:'var(--mono)',fontSize:'.7rem',fontWeight:700,color:weeklyDiff>0?'var(--red)':weeklyDiff<0?'var(--green)':'var(--muted)'}}>
                  {weeklyDiff>0?`+${fmt(weeklyDiff)} over`:weeklyDiff<0?`${fmt(Math.abs(weeklyDiff))} under`:'on track'}
                </span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{flex:1,background:'#E2E8F0',borderRadius:99,height:6,overflow:'hidden'}}>
                  <div style={{height:6,borderRadius:99,width:`${Math.min(100,weekTotal/weeklyBudget*100)}%`,background:weeklyDiff>0?'#dc2626':weeklyDiff/weeklyBudget<-0.3?'#16a34a':'#d97706',transition:'width .4s'}}/>
                </div>
                <span style={{fontFamily:'var(--mono)',fontSize:'.62rem',color:'var(--muted)',whiteSpace:'nowrap'}}>{fmt(weekTotal)} / {fmt(weeklyBudget)}</span>
              </div>
            </div>
            <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>
              {weekDebit>0&&<div style={{flex:1,minWidth:80,background:'#F1F5F9',borderRadius:10,padding:'.5rem .7rem'}}><div style={{fontSize:'.58rem',fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>Debit</div><div style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:'1rem',color:'var(--text)'}}>{fmt(weekDebit)}</div></div>}
              {weekSBI>0&&<div style={{flex:1,minWidth:80,background:'#DBEAFE',borderRadius:10,padding:'.5rem .7rem'}}><div style={{fontSize:'.58rem',fontWeight:700,color:'#1D4ED8',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>SBI</div><div style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:'1rem',color:'#1E3A8A'}}>{fmt(weekSBI)}</div></div>}
              {weekYES>0&&<div style={{flex:1,minWidth:80,background:'#EDE9FE',borderRadius:10,padding:'.5rem .7rem'}}><div style={{fontSize:'.58rem',fontWeight:700,color:'#7C3AED',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>YES</div><div style={{fontFamily:'var(--mono)',fontWeight:700,fontSize:'1rem',color:'#4C1D95'}}>{fmt(weekYES)}</div></div>}
            </div>
          </div>
        }
      </>}
    </div>
  );
}

// CHECK-IN
// ══════════════════════════════════════════════════════════════════════════════
function CheckIn({s,save,toast}) {
  const pred=predDebit(s);
  const [dv,setDv]=useState(String(s.accounts.debit.balance));
  const [sv,setSv]=useState(String(s.accounts.sbi.available));
  const [yv,setYv]=useState(String(s.accounts.yes.available));
  const [note,setNote]=useState('');
  const [busy,setBusy]=useState(false);
  const dvN=dv===''?0:Number(dv), svN=sv===''?0:Number(sv), yvN=yv===''?0:Number(yv);
  const ds=Math.max(0,Math.round(pred-dvN));
  const ss=Math.max(0,Math.round(s.accounts.sbi.available-svN));
  const ys=Math.max(0,Math.round(s.accounts.yes.available-yvN));
  const hasChange=ds>0||ss>0||ys>0;

  function buildCats(ds, ss, ys) {
    const cats={};
    const currentCats={};
    s.checkin_log.forEach(e=>{ Object.entries(e.cats||{}).forEach(([c,v])=>{ currentCats[c]=(currentCats[c]||0)+v; }); });
    function distribute(amount, cardName) {
      const all=s.variable.filter(v=>v.card===cardName);
      const withBudget=all.filter(v=>(currentCats[v.category]||0)<v.budget);
      const targets=withBudget.length>0?withBudget:all;
      targets.forEach(v=>{ cats[v.category]=(cats[v.category]||0)+Math.round(amount/targets.length); });
    }
    if (ss>0) distribute(ss,'SBI');
    if (ys>0) distribute(ys,'YES');
    if (ds>0) distribute(ds,'Debit');
    return cats;
  }

  async function log() {
    if (!hasChange){toast('No change detected');return;}
    setBusy(true);
    const cats=buildCats(ds,ss,ys);
    const e={
      ts: new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}),
      debit:ds, sbi:ss, yes:ys, cats, note:note.trim()
    };
    await save({...s,
      checkin_log:[...s.checkin_log,e],
      accounts:{
        debit:{balance:dvN},
        sbi:{...s.accounts.sbi,available:svN},
        yes:{...s.accounts.yes,available:yvN},
      }
    });
    toast(`Logged · Debit ${fmt(ds)} · SBI ${fmt(ss)} · YES ${fmt(ys)}`);
    setNote('');setBusy(false);
  }

  async function del(i) {
    const e=s.checkin_log[i];
    await save({...s,
      checkin_log:s.checkin_log.filter((_,j)=>j!==i),
      accounts:{
        debit:{balance:Math.round(s.accounts.debit.balance+e.debit)},
        sbi:{...s.accounts.sbi,available:Math.min(s.accounts.sbi.limit,Math.round(s.accounts.sbi.available+e.sbi))},
        yes:{...s.accounts.yes,available:Math.min(s.accounts.yes.limit,Math.round(s.accounts.yes.available+e.yes))},
      }
    });
    toast('Entry deleted');
  }

  return(
    <div className="page">
      <div className="sh" style={{marginTop:'.4rem'}}>Predicted Debit Balance</div>
      <div className="pb">
        <div className="pl">📊 Debit should show right now</div>
        <div className="pv">{fmt(pred)}</div>
        <div className="ps">Income {fmt(income(s))} − paid fixed {fmt(paidFix(s))}{s.savings.done?` − savings ${fmt(s.savings.budget)}`:''} − paid debts {fmt(paidDbt(s))} − debit var {fmt(vCard(s,'debit'))}</div>
      </div>

      <div className="sh">Enter Current Balances</div>
      <div className="card mb1">
        <div className="mb1">
          <div className="row mb1"><span style={{fontWeight:600}}>🏦 Debit (BHIM)</span><span className="mono sm cm" style={{marginLeft:'auto'}}>pred: {fmt(pred)}</span></div>
          <input type="number" value={dv} onChange={e=>setDv(e.target.value)} onBlur={e=>{if(e.target.value==='')setDv('0')}} inputMode="numeric"/>
          {ds>0&&<div className="mono sm cr" style={{marginTop:4}}>Will log {fmt(ds)} as debit spend</div>}
        </div>
        <hr/>
        <div className="mb1">
          <div className="row mb1"><span style={{fontWeight:600}}>💳 SBI Credit</span><span className="mono sm cm" style={{marginLeft:'auto'}}>last: {fmt(s.accounts.sbi.available)}</span></div>
          <input type="number" value={sv} onChange={e=>setSv(e.target.value)} onBlur={e=>{if(e.target.value==='')setSv('0')}} inputMode="numeric" max={s.accounts.sbi.limit}/>
          {ss>0&&<div className="mono sm ca" style={{marginTop:4}}>Will log {fmt(ss)} on SBI</div>}
        </div>
        <hr/>
        <div>
          <div className="row mb1"><span style={{fontWeight:600}}>💳 YES RuPay</span><span className="mono sm cm" style={{marginLeft:'auto'}}>last: {fmt(s.accounts.yes.available)}</span></div>
          <input type="number" value={yv} onChange={e=>setYv(e.target.value)} onBlur={e=>{if(e.target.value==='')setYv('0')}} inputMode="numeric" max={s.accounts.yes.limit}/>
          {ys>0&&<div className="mono sm ca" style={{marginTop:4}}>Will log {fmt(ys)} on YES</div>}
        </div>
      </div>

      {/* Split preview — shows distribution BEFORE logging */}
      {hasChange&&<SplitPreview ds={ds} ss={ss} ys={ys} s={s}/>}

      <input type="text" placeholder="Note (optional)" value={note} onChange={e=>setNote(e.target.value)} className="mb1" style={{display:'block'}}/>
      <button className="btn bp mb1" onClick={log} disabled={busy}>{busy?'Saving…':'✓ Log Check-in'}</button>

      {s.checkin_log.length>0&&<>
        <div className="sh">Log ({s.checkin_log.length} entries)</div>
        {[...s.checkin_log].reverse().map((e,ri)=>{
          const idx=s.checkin_log.length-1-ri;
          return(
            <div key={idx} className="le">
              <div style={{flex:1}}>
                <div className="mono" style={{fontSize:'.62rem',color:'var(--muted)'}}>{e.ts}</div>
                <div className="lp" style={{marginTop:4}}>
                  {e.debit>0&&<span className="lpi ld">Debit {fmt(e.debit)}</span>}
                  {e.sbi>0&&<span className="lpi ls">SBI {fmt(e.sbi)}</span>}
                  {e.yes>0&&<span className="lpi ly">YES {fmt(e.yes)}</span>}
                  {e.note&&<span className="mono" style={{fontSize:'.62rem',color:'var(--muted)'}}>{e.note}</span>}
                </div>
              </div>
              <button className="bdng" onClick={()=>del(idx)}>✕</button>
            </div>
          );
        })}
      </>}
    </div>
  );
}

          {s.variable.map((v,i)=>{

              <div key={i} className="er">
                <div className="eh">

}

      <div className="ins inf mb1">
        🏦 Still to spend: fixed <b>{fmt(unpaidFix(s))}</b> + all var <b>{fmt(allVarRem)}</b> + debts <b>{fmt(totDebts(s)-paidDbt(s))}</b> = <b>{fmt(sts)}</b>
        &nbsp;·&nbsp; Debit after credit bills: <b>{fmt(s.accounts.debit.balance)}</b> − SBI <b>{fmt(sc)}</b> − YES <b>{fmt(yc)}</b> = <b>{fmt(debitAfterCreditBills)}</b>
      </div>
      <div className="g2 mb1">
        <div className="card"><div className="cl">Debit Balance</div><div className="cv">{fmt(s.accounts.debit.balance)}</div><div className="cs">actual</div></div>
        <div className="card"><div className="cl">Total Needed</div><div className="cv">{fmt(needed)}</div><div className="cs">all obligations</div></div>
        <div className="card"><div className="cl">SBI Bill Owed</div><div className="cv cm" style={{fontSize:'1.05rem'}}>{fmt(sc)}</div><div className="cs">{fmt(sr)} budget still left</div></div>
        <div className="card"><div className="cl">YES Bill Owed</div><div className="cv cm" style={{fontSize:'1.05rem'}}>{fmt(yc)}</div><div className="cs">{fmt(yr)} budget still left</div></div>
      </div>
      <div className={`sfh mb1 ${sb<=0?'ok':''}`}>
        <div className="cl">{sb>0?'⚠ Short By':'✓ Surplus'}</div>
        <div className={`cv ${sb>0?'cr':'cg'}`}>{fmt(Math.abs(sb))}</div>
        <div className="cs">{sb>0?'top up needed':'debit covers everything ✓'}</div>
      </div>
      {sb>0
        ?<div className="ins bd">🚨 Debit short by <b>{fmt(sb)}</b> — top up or reduce spending</div>
        :<div className="ins gd">✅ Debit surplus <b>{fmt(Math.abs(sb))}</b> after all obligations</div>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════════════════════
function Settings({s,save,toast}) {
  return(
    <div className="page">
      <div className="sh" style={{marginTop:'.4rem'}}>Base Budget</div>
      <div className="card mb1">
        <div className="il">Monthly Income</div>
        <input type="number" value={s.base_budget} inputMode="numeric" onChange={e=>save({...s,base_budget:Number(e.target.value)})}/>
      </div>

      <div className="sh">Additional Income</div>
      <div className="gap mb1">
        {s.additional_income.map((inc,i)=>(
          <div key={i} className="card">
            <div className="row">
              <div className="f1 gap">
                <input type="text" placeholder="Source" value={inc.source} onChange={e=>{const ai=s.additional_income.map((x,j)=>j===i?{...x,source:e.target.value}:x);save({...s,additional_income:ai});}}/>
                <input type="number" placeholder="Amount" value={inc.amount} inputMode="numeric" onChange={e=>{const ai=s.additional_income.map((x,j)=>j===i?{...x,amount:Number(e.target.value)}:x);save({...s,additional_income:ai});}}/>
              </div>
              <button className="bdng" onClick={()=>save({...s,additional_income:s.additional_income.filter((_,j)=>j!==i)})}>✕</button>
            </div>
          </div>
        ))}
      </div>
      <button className="btn bs mb1" onClick={()=>save({...s,additional_income:[...s.additional_income,{source:'',amount:0}]})}>＋ Add Income Source</button>

      <div className="sh">Cashback Earned</div>
      <div className="ins inf mb1">🎁 Enter cashback credited to your card this month. It reduces the bill owed from your debit balance.</div>
      <div className="card gap mb1">
        <div>
          <div className="il">SBI Cashback / Rewards</div>
          <input type="number" value={s.accounts.sbi.cashback||0} inputMode="numeric"
            onChange={e=>save({...s,accounts:{...s.accounts,sbi:{...s.accounts.sbi,cashback:Number(e.target.value)}}})}/>
          {(s.accounts.sbi.cashback||0)>0&&<div className="mono sm cg" style={{marginTop:4}}>Reduces SBI bill by {fmt(s.accounts.sbi.cashback)}</div>}
        </div>
        <div>
          <div className="il">YES RuPay Cashback / Rewards</div>
          <input type="number" value={s.accounts.yes.cashback||0} inputMode="numeric"
            onChange={e=>save({...s,accounts:{...s.accounts,yes:{...s.accounts.yes,cashback:Number(e.target.value)}}})}/>
          {(s.accounts.yes.cashback||0)>0&&<div className="mono sm cg" style={{marginTop:4}}>Reduces YES bill by {fmt(s.accounts.yes.cashback)}</div>}
        </div>
      </div>

      <div className="sh">Savings Target</div>
      <div className="card mb1">
        <div className="il">Monthly Savings</div>
        <input type="number" value={s.savings.budget} inputMode="numeric" onChange={e=>save({...s,savings:{...s.savings,budget:Number(e.target.value)}})}/>
      </div>

      <div className="sh">Account Limits</div>
      <div className="card gap mb1">
        <div><div className="il">SBI Credit Limit</div><input type="number" value={s.accounts.sbi.limit} inputMode="numeric" onChange={e=>save({...s,accounts:{...s.accounts,sbi:{...s.accounts.sbi,limit:Number(e.target.value)}}})}/></div>
        <div><div className="il">YES RuPay Limit</div><input type="number" value={s.accounts.yes.limit} inputMode="numeric" onChange={e=>save({...s,accounts:{...s.accounts,yes:{...s.accounts.yes,limit:Number(e.target.value)}}})}/></div>
      </div>

      <div className="sh" style={{color:'var(--red)'}}>Danger Zone</div>
      <button className="btn" style={{background:'var(--red-bg)',color:'var(--red)',border:'1px solid var(--red-bd)'}}
        onClick={()=>{if(confirm('Reset ALL data to defaults?'))save(JSON.parse(JSON.stringify(DEFAULT))).then(()=>toast('Reset complete'));}}>
        Reset to defaults
      </button>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [state,setState]=useState(null);
  const [page,setPage]=useState('overview');
  const [tmsg,setTmsg]=useState('');
  const timer=useRef(null);

  function toast(msg){setTmsg(msg);if(timer.current)clearTimeout(timer.current);timer.current=setTimeout(()=>setTmsg(''),2500);}

  function deepMerge(def,saved) {
    const r={...def};
    for(const k in saved){
      if(k in r&&typeof r[k]==='object'&&!Array.isArray(r[k])&&r[k]!==null) r[k]=deepMerge(r[k],saved[k]);
      else r[k]=saved[k];
    }
    return r;
  }

  useEffect(()=>{
    (async()=>{
      const {data}=await db.from('budget_state').select('data').eq('id','main').single();
      if (data?.data) {
        const merged=deepMerge(JSON.parse(JSON.stringify(DEFAULT)),data.data);
        setState(migrate(merged));
      } else {
        setState(JSON.parse(JSON.stringify(DEFAULT)));
      }
    })();
  },[]);

  const save=useCallback(async ns=>{
    setState(ns);
    await db.from('budget_state').upsert({id:'main',data:ns,updated_at:new Date().toISOString()});
  },[]);

  if (!state) return<div className="loading"><div className="spinner"/><div className="mono sm cm">Loading…</div></div>;

  const nav=[
    {id:'overview', label:'Home',     icon:<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>},
    {id:'checkin',  label:'Check-in', icon:<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>},
    {id:'expenses', label:'Expenses', icon:<><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>},
    {id:'savings',  label:'Debts',    icon:<><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>},
    {id:'settings', label:'Settings', icon:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>},
  ];

  return(
    <>
      {page==='overview'&&<Overview s={state}/>}
      {page==='checkin' &&<CheckIn  s={state} save={save} toast={toast}/>}
      {page==='expenses'&&<Expenses s={state} save={save} toast={toast}/>}
      {page==='savings' &&<SavingsDebts s={state} save={save} toast={toast}/>}
      {page==='settings'&&<Settings s={state} save={save} toast={toast}/>}
      <nav className="nav">
        {nav.map(n=>(
          <button key={n.id} className={`nb ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">{n.icon}</svg>
            {n.label}
            <div className="nb-dot"/>
          </button>
        ))}
      </nav>
      <Toast msg={tmsg}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
