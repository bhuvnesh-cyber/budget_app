<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#F7F7F5"/>
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#F7F7F5; --s1:#FFFFFF; --s2:#F0F0ED; --s3:#E8E8E4;
  --bd:#E2E2DC; --bd2:#D4D4CC;
  --tx:#1A1A18; --m1:#6B6B62; --m2:#9B9B90;
  --acc:#1A6B3C; --acc-bg:#EBF5EF; --acc-bd:#C3DFD0;
  --red:#C0392B; --red-bg:#FDEDEC; --red-bd:#F5C6C2;
  --grn:#1A6B3C; --grn-bg:#EBF5EF; --grn-bd:#C3DFD0;
  --amb:#9A5B00; --amb-bg:#FEF6E7; --amb-bd:#F8DFA8;
  --blu:#1A4A8A; --blu-bg:#EBF0FA; --blu-bd:#C3D3F0;
  --nav-h:64px; --safe-b:env(safe-area-inset-bottom,0px);
  --r:12px; --rs:8px;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--sans);overflow-x:hidden;font-size:15px}
#root{display:flex;flex-direction:column;min-height:100%}

.page{flex:1;padding:.75rem 1rem calc(var(--nav-h) + var(--safe-b) + 1.5rem);max-width:520px;margin:0 auto;width:100%}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));
  background:rgba(247,247,245,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);display:flex;align-items:stretch;z-index:100;padding-bottom:var(--safe-b)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:none;border:none;cursor:pointer;color:var(--m2);font-family:var(--sans);
  font-size:.52rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:color .15s}
.nb.on{color:var(--acc)}
.nb svg{width:18px;height:18px;stroke-width:1.8;fill:none;stroke:currentColor}

/* Cards */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.9rem 1rem;box-shadow:var(--shadow)}
.card+.card{margin-top:.5rem}

/* Section header */
.sh{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--m2);
  font-weight:700;margin:1.4rem 0 .6rem;display:flex;align-items:center;gap:.6rem}
.sh::after{content:'';flex:1;height:1px;background:var(--bd)}

/* Labels */
.sl{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--m2);font-weight:700;margin-bottom:4px}
.sv{font-size:1.4rem;font-weight:700;line-height:1;font-family:var(--mono);letter-spacing:-.02em}
.ss{font-size:.68rem;color:var(--m1);margin-top:4px;font-family:var(--mono)}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.5rem}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;
  font-size:.6rem;font-weight:600;border:1px solid transparent;white-space:nowrap;font-family:var(--sans);letter-spacing:.02em}
.pill.gd{background:var(--grn-bg);border-color:var(--grn-bd);color:var(--grn)}
.pill.wn{background:var(--amb-bg);border-color:var(--amb-bd);color:var(--amb)}
.pill.bd{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.pill.inf{background:var(--blu-bg);border-color:var(--blu-bd);color:var(--blu)}
.pill.acc{background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc)}
.pill-row{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem}

/* Notes */
.note{display:flex;align-items:center;gap:8px;padding:.45rem .8rem;border-radius:8px;
  font-size:.72rem;font-weight:500;margin-bottom:.5rem;border-left:2px solid}
.note.gd{background:var(--grn-bg);border-color:var(--grn);color:var(--grn)}
.note.wn{background:var(--amb-bg);border-color:var(--amb);color:var(--amb)}
.note.bd{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.note.inf{background:var(--blu-bg);border-color:var(--blu);color:var(--blu)}

/* Progress */
.bw{background:var(--s3);border-radius:99px;height:3px;margin-top:6px;overflow:hidden}
.bf{height:3px;border-radius:99px;transition:width .4s ease}

/* Inputs */
input[type=number],input[type=text]{
  width:100%;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);
  border-radius:var(--rs);font-family:var(--mono);font-size:.9rem;font-weight:500;
  padding:.65rem .9rem;outline:none;appearance:none;-moz-appearance:textfield;transition:border-color .15s,box-shadow .15s}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(26,107,60,.08);background:var(--s1)}
input::placeholder{color:var(--m2)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:.7rem 1.2rem;border-radius:var(--rs);border:none;cursor:pointer;
  font-family:var(--sans);font-weight:600;font-size:.85rem;letter-spacing:.01em;transition:all .12s;width:100%}
.bp{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(26,107,60,.25)}
.bp:active{transform:scale(.97);opacity:.9}
.bp:disabled{opacity:.45;cursor:not-allowed;transform:none}
.bs{background:var(--s1);border:1.5px solid var(--bd);color:var(--m1);box-shadow:var(--shadow)}
.bdng{background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--m2);font-size:.8rem;
  border-radius:6px;transition:color .1s,background .1s;font-family:var(--mono)}
.bdng:hover{color:var(--red);background:var(--red-bg)}

/* Toggle */
.tgl{position:relative;width:40px;height:23px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:var(--bd2);border-radius:99px;cursor:pointer;transition:.2s}
.tsl:before{content:'';position:absolute;width:17px;height:17px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl input:checked+.tsl{background:var(--acc)}
.tgl input:checked+.tsl:before{transform:translateX(17px)}

/* Expense rows */
.er{padding:.75rem 0;border-bottom:1px solid var(--bd)}
.er:last-child{border-bottom:none}
.eh{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.en{font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:6px}
.chip{font-size:.55rem;padding:2px 7px;border-radius:99px;font-weight:700;letter-spacing:.06em;font-family:var(--mono)}
.cs_{background:rgba(26,74,138,.12);color:var(--blu)}
.cy{background:rgba(26,107,60,.1);color:var(--grn)}
.cd{background:var(--s3);color:var(--m1)}

/* Tab bar */
.tab-bar{display:flex;background:var(--s2);border-radius:10px;padding:3px;margin-bottom:.8rem;gap:2px;border:1px solid var(--bd)}
.tab{flex:1;padding:.4rem .5rem;border:none;border-radius:7px;cursor:pointer;
  font-family:var(--sans);font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--m2);background:transparent;transition:all .15s}
.tab.on{color:var(--acc);background:var(--s1);box-shadow:var(--shadow)}

/* Misc */
hr{border:none;border-top:1px solid var(--bd);margin:.75rem 0}
.row{display:flex;align-items:center;gap:.5rem}
.f1{flex:1}
.mono{font-family:var(--mono)}
.sm{font-size:.75rem}
.il{font-size:.6rem;color:var(--m2);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.gap{display:flex;flex-direction:column;gap:.45rem}
.mb{margin-bottom:.5rem}

/* Waterfall */
.wf{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:.5rem;box-shadow:var(--shadow)}
.wfr{display:flex;justify-content:space-between;align-items:center;padding:.6rem .9rem;border-bottom:1px solid var(--bd);font-size:.78rem}
.wfr:last-child{border-bottom:none}
.wfl{color:var(--m1);font-weight:500;font-size:.72rem}
.wfv{font-family:var(--mono);font-weight:600;font-size:.76rem}
.wfr.hd{background:var(--s2)}
.wfr.fin{background:var(--s2)}

/* Hero */
.hero{border-radius:var(--r);padding:1.1rem 1.1rem 1rem;margin-bottom:.75rem;border:1px solid;box-shadow:var(--shadow-md)}
.hero-amt{font-family:var(--mono);font-size:2rem;font-weight:700;line-height:1;letter-spacing:-.03em;margin:.2rem 0 .6rem}
.hero-lbl{font-size:.58rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.75rem}
.hlbl{color:var(--m1);font-weight:500}
.hval{font-family:var(--mono);font-weight:600;font-size:.76rem}

/* Spend log */
.log-entry{display:flex;justify-content:space-between;align-items:center;padding:.6rem .9rem;
  border-bottom:1px solid var(--bd);font-size:.78rem}
.log-entry:last-child{border-bottom:none}
.log-time{font-size:.62rem;color:var(--m2);font-family:var(--mono);margin-top:2px}
.log-note{font-size:.72rem;color:var(--m1);margin-top:1px}

/* Loading / Toast */
.loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:.75rem}
.spinner{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%);
  background:var(--tx);color:var(--bg);padding:.5rem 1.2rem;border-radius:99px;
  font-size:.75rem;font-weight:700;font-family:var(--sans);z-index:200;animation:fu .18s ease;white-space:nowrap;letter-spacing:.02em;box-shadow:var(--shadow-md)}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.upd{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;color:var(--m2);font-family:var(--mono)}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* Big number input */
.big-input-wrap{position:relative;margin-bottom:.3rem}
.big-input-prefix{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);
  font-family:var(--mono);font-size:1.1rem;font-weight:600;color:var(--m1);pointer-events:none;z-index:1}
input.big-inp{padding:.75rem .9rem .75rem 1.8rem;font-size:1.15rem;font-weight:600;background:var(--s2);border:1.5px solid var(--bd)}
input.big-inp:focus{border-color:var(--acc);background:var(--s1)}

/* Sanity row */
.sanity{display:flex;align-items:center;justify-content:space-between;background:var(--s2);
  border-radius:8px;padding:.5rem .8rem;margin-top:.4rem;border:1px solid var(--bd)}
.sanity-lbl{font-size:.65rem;color:var(--m1);font-weight:500}
.sanity-val{font-family:var(--mono);font-size:.75rem;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo} = React;

const SUPA_URL = 'https://jyacewgyqvrqybeyrcig.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5YWNld2d5cXZycXliZXlyY2lnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzUxNTYsImV4cCI6MjA5MDk1MTE1Nn0.yMffM11nwBLiyd3-M4n-Fx5oVirCK4uojkLu2JLw5xU';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const WARN = 0.75;

const DEFAULT = {
  version: 7,
  base_budget: 83500,
  additional_income: [{source:'Bank Interest', amount:69}],
  fixed: [
    {category:'Family',         budget:15000, paid:false},
    {category:'Rent',           budget:21500, paid:false},
    {category:'Milk',           budget:2940,  paid:false},
    {category:'Rent_Furniture', budget:2994,  paid:false},
    {category:'School',         budget:3000,  paid:false},
    {category:'Recharge',       budget:1000,  paid:false},
    {category:'Gas',            budget:531,   paid:false},
    {category:'Electric',       budget:735,   paid:false},
    {category:'WIFI',           budget:800,   paid:false},
  ],
  variable: [
    {category:'Instamart', budget:6000, card:'SBI'},
    {category:'Swiggy',    budget:1000, card:'SBI'},
    {category:'Amazon',    budget:3000, card:'SBI'},
    {category:'Other',     budget:8000, card:'YES'},
    {category:'Mall',      budget:4000, card:'Debit'},
    {category:'Clothes',   budget:2000, card:'Debit'},
    {category:'Doctor',    budget:1000, card:'Debit'},
  ],
  savings: {budget:10000, done:false},
  debts: [{name:'Credit Bill', amount:7932, paid:false}],
  accounts: {
    // opening_balance = balance set at start of month (never changes mid-month unless reset)
    // balance = current actual balance (updated each check-in)
    debit: {opening_balance:83569, balance:83569},
    sbi:   {limit:20000, available:20000, cashback:0},
    yes:   {limit:51000, available:51000, cashback:0},
  },
  cash: 0,
  // Debit variable spend log: [{amount, note, ts}]
  debit_spend_log: [],
  updated_at: null,
};

function migrate(s) {
  if (!s.accounts) s.accounts = JSON.parse(JSON.stringify(DEFAULT.accounts));
  if (!s.accounts.sbi) s.accounts.sbi = JSON.parse(JSON.stringify(DEFAULT.accounts.sbi));
  if (!s.accounts.yes) s.accounts.yes = JSON.parse(JSON.stringify(DEFAULT.accounts.yes));
  if (!s.accounts.debit) s.accounts.debit = {opening_balance:83569, balance:83569};
  if (s.accounts.sbi.cashback === undefined) s.accounts.sbi.cashback = 0;
  if (s.accounts.yes.cashback === undefined) s.accounts.yes.cashback = 0;
  if (s.cash === undefined) s.cash = 0;
  if (!s.updated_at) s.updated_at = null;
  // Migrate old debit structure
  if (s.accounts.debit && s.accounts.debit.opening_balance === undefined) {
    s.accounts.debit.opening_balance = s.accounts.debit.balance || 0;
  }
  // Remove old logs
  delete s.debit_log;
  delete s.checkin_log;
  // Migrate old fixed (remove 'spent' field, keep paid)
  if (s.fixed) {
    s.fixed = s.fixed.map(f => ({category:f.category, budget:f.budget, paid:!!f.paid}));
  }
  if (!s.debit_spend_log) s.debit_spend_log = [];
  s.version = 7;
  return s;
}

const today   = new Date();
const mLbl    = today.toLocaleDateString('en-IN', {month:'long', year:'numeric'});
const lastDay = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
const dLeft   = Math.max(1, lastDay - today.getDate());
const wLeft   = Math.max(1, Math.ceil(dLeft/7));

const fmt  = n => '₹' + Math.round(n).toLocaleString('en-IN');
const pct  = (a,b) => b ? Math.round(a/b*100) : 0;
const bClr = (sp,bud) => { const p=bud?sp/bud:0; return p>1?'var(--red)':p>WARN?'var(--amb)':'var(--grn)' };

function timeSince(iso) {
  if (!iso) return {label:'never', dot:'var(--red)'};
  const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (diff < 60)   return {label:`${diff}m ago`, dot:'var(--grn)'};
  if (diff < 1440) return {label:`${Math.floor(diff/60)}h ago`, dot:'var(--grn)'};
  const days = Math.floor(diff/1440);
  if (days <= 3)   return {label:`${days}d ago`, dot:'var(--amb)'};
  return              {label:`${days}d ago`, dot:'var(--red)'};
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + ' ' +
         d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

// ── Aggregators ───────────────────────────────────────────────────────────────
const totIncome      = s => s.base_budget + s.additional_income.reduce((a,i)=>a+i.amount,0);
const paidFixedAmt   = s => s.fixed.filter(f=>f.paid).reduce((a,f)=>a+f.budget,0);
const unpaidFixedAmt = s => s.fixed.filter(f=>!f.paid).reduce((a,f)=>a+f.budget,0);
const totVarBud      = s => s.variable.reduce((a,v)=>a+v.budget,0);
const totDebts       = s => s.debts.reduce((a,d)=>a+d.amount,0);
const paidDebts      = s => s.debts.filter(d=>d.paid).reduce((a,d)=>a+d.amount,0);
const unpaidDebts    = s => totDebts(s)-paidDebts(s);
const sbiSpent       = s => Math.max(0, s.accounts.sbi.limit - s.accounts.sbi.available - (s.accounts.sbi.cashback||0));
const yesSpent       = s => Math.max(0, s.accounts.yes.limit - s.accounts.yes.available - (s.accounts.yes.cashback||0));
const totCreditBills = s => sbiSpent(s)+yesSpent(s);
const debitVarSpent  = s => (s.debit_spend_log||[]).reduce((a,e)=>a+e.amount,0);

// ── Predicted debit balance ───────────────────────────────────────────────────
// Opening balance − all paid fixed expenses − manually logged debit variable spend
const predictedDebit = s =>
  s.accounts.debit.opening_balance - paidFixedAmt(s) - debitVarSpent(s);

// ── Waterfall (from ACTUAL current balance) ────────────────────────────────────
// Actual balance is ground truth. We figure out how much is "spoken for".
function waterfall(s) {
  const balance    = s.accounts.debit.balance;
  const cash       = s.cash||0;
  const totalFunds = balance + cash;

  const creditBill = totCreditBills(s);   // will pay from debit
  const fixedPend  = unpaidFixedAmt(s);   // not yet paid fixed
  const savPend    = s.savings.done ? 0 : s.savings.budget;
  const debtPend   = unpaidDebts(s);

  const afterBills = totalFunds  - creditBill;
  const afterFixed = afterBills  - fixedPend;
  const afterDebts = afterFixed  - debtPend;
  const afterSav   = afterDebts  - savPend;

  // Debit variable budget
  const dVarBud   = s.variable.filter(v=>v.card==='Debit').reduce((a,v)=>a+v.budget,0);
  const dVarSpent = debitVarSpent(s);
  const dVarLeft  = dVarBud - dVarSpent;

  const shortBy = afterSav < 0 ? Math.abs(afterSav) : Math.max(0, -afterSav + (afterSav >= 0 ? 0 : 0));
  // surplus/shortfall after accounting for debit variable budget
  const net     = afterSav - dVarBud;
  const surplus = net > 0 ? net : 0;
  const short   = net < 0 ? Math.abs(net) : 0;

  return {
    balance, cash, totalFunds,
    creditBill, afterBills,
    fixedPend, afterFixed,
    debtPend, afterDebts,
    savPend, afterSav,
    dVarBud, dVarSpent, dVarLeft,
    surplus, short,
  };
}

const totVarSpent = s => sbiSpent(s) + yesSpent(s) + debitVarSpent(s);

// ── Mini components ───────────────────────────────────────────────────────────
function Bar({sp, bud}) {
  const p = bud ? Math.min(100, sp/bud*100) : 0;
  return <div className="bw"><div className="bf" style={{width:p+'%', background:bClr(sp,bud)}}/></div>;
}
function Tog({v, onChange}) {
  return <label className="tgl"><input type="checkbox" checked={v} onChange={e=>onChange(e.target.checked)}/><span className="tsl"/></label>;
}
function Toast({msg}) { return msg ? <div className="toast">{msg}</div> : null; }
function UpdatedAt({ts}) {
  const {label, dot} = timeSince(ts);
  return <span className="upd"><span className="dot" style={{background:dot}}/>{label}</span>;
}

// ── Waterfall Card ────────────────────────────────────────────────────────────
function WaterfallCard({s}) {
  const wf = waterfall(s);
  const rows = [
    {label:'Credit bills (SBI + YES)', val:wf.creditBill, after:wf.afterBills, show:wf.creditBill>0},
    {label:'Unpaid fixed expenses',    val:wf.fixedPend,  after:wf.afterFixed, show:wf.fixedPend>0},
    {label:'Pending debts',            val:wf.debtPend,   after:wf.afterDebts, show:wf.debtPend>0},
    {label:'Savings to transfer',      val:wf.savPend,    after:wf.afterSav,   show:wf.savPend>0},
    {label:'Debit variable budget',    val:wf.dVarBud,    after:wf.afterSav - wf.dVarBud, show:true},
  ].filter(r=>r.show);

  return (
    <div className="wf">
      <div className="wfr hd">
        <span className="wfl" style={{color:'var(--tx)',fontWeight:700}}>Debit balance</span>
        <span className="wfv">{fmt(wf.balance)}</span>
      </div>
      {wf.cash>0 && (
        <div className="wfr hd">
          <span className="wfl">+ Cash on hand</span>
          <span className="wfv" style={{color:'var(--grn)'}}>{fmt(wf.cash)}</span>
        </div>
      )}
      {rows.map((r,i) => {
        const col = r.after<0?'var(--red)':r.after<3000?'var(--amb)':'var(--grn)';
        return (
          <div key={i} className="wfr">
            <div>
              <div className="wfl">{r.label}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:'.62rem',color:'var(--red)',marginTop:1}}>− {fmt(r.val)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:'.55rem',color:'var(--m2)'}}>remaining</div>
              <div className="wfv" style={{color:col}}>{fmt(r.after)}</div>
            </div>
          </div>
        );
      })}
      <div className="wfr fin">
        <span className="wfl" style={{fontWeight:700,color:wf.short>0?'var(--red)':'var(--grn)'}}>
          {wf.short>0 ? '⚠ Short by' : '✓ Surplus'}
        </span>
        <span className="wfv" style={{fontSize:'1rem',color:wf.short>0?'var(--red)':'var(--grn)'}}>
          {fmt(wf.short>0 ? wf.short : wf.surplus)}
        </span>
      </div>
    </div>
  );
}

// ── Hero ──────────────────────────────────────────────────────────────────────
function Hero({s}) {
  const wf  = waterfall(s);
  const isOk = wf.short === 0;
  return (
    <div className="hero" style={{
      background: isOk ? 'var(--grn-bg)' : 'var(--red-bg)',
      borderColor: isOk ? 'var(--grn-bd)' : 'var(--red-bd)'
    }}>
      <div className="hero-lbl" style={{color: isOk?'var(--grn)':'var(--red)'}}>
        {isOk ? 'All good · Surplus' : 'Heads up · Short by'}
      </div>
      <div className="hero-amt" style={{color: isOk?'var(--grn)':'var(--red)'}}>
        {fmt(isOk ? wf.surplus : wf.short)}
      </div>
      <div style={{borderTop:`1px solid ${isOk?'var(--grn-bd)':'var(--red-bd)'}`,paddingTop:'.5rem',display:'flex',flexDirection:'column',gap:2}}>

        {wf.cash>0&&<div className="hrow"><span className="hlbl">Cash</span><span className="hval" style={{color:'var(--grn)'}}>{fmt(wf.cash)}</span></div>}
        <div className="hrow"><span className="hlbl">Credit bills due</span><span className="hval" style={{color:wf.creditBill>0?'var(--amb)':'var(--m1)'}}>{fmt(wf.creditBill)}</span></div>
        <div className="hrow"><span className="hlbl">Freely spendable</span><span className="hval" style={{color:wf.afterSav>=0?'var(--grn)':wf.afterSav>-3000?'var(--amb)':'var(--red)'}}>{fmt(wf.afterSav)}</span></div>
      </div>
    </div>

}

// ── Insights pills ────────────────────────────────────────────────────────────
function Insights({s}) {
  const wf  = waterfall(s);
  const tvs = totVarSpent(s);
  const tvb = totVarBud(s);
  const varRem = tvb - tvs;
  const pills = [];

  if (wf.short>0)   pills.push({t:'bd',  text:`Short ${fmt(wf.short)}`});
  else               pills.push({t:'gd',  text:`${fmt(wf.surplus)} surplus`});
  if (varRem>0)      pills.push({t:'inf', text:`${fmt(Math.round(varRem/wLeft))}/wk left`});
  else if (varRem<0) pills.push({t:'bd',  text:`Over budget ${fmt(-varRem)}`});
  if (wf.fixedPend>0)  pills.push({t:'wn', text:`${fmt(wf.fixedPend)} fixed pending`});
  if (!s.savings.done) pills.push({t:'wn', text:'Savings pending'});
  const sbiUtil = pct(sbiSpent(s), s.accounts.sbi.limit);
  const yesUtil = pct(yesSpent(s), s.accounts.yes.limit);
  if (sbiUtil>75) pills.push({t:'wn', text:`SBI ${sbiUtil}% used`});
  if (yesUtil>75) pills.push({t:'wn', text:`YES ${yesUtil}% used`});
  const cb = (s.accounts.sbi.cashback||0)+(s.accounts.yes.cashback||0);
  if (cb>0) pills.push({t:'acc', text:`${fmt(cb)} cashback`});

  return <div className="pill-row">{pills.map((p,i)=><span key={i} className={`pill ${p.t}`}>{p.text}</span>)}</div>;
}

// CHECK-IN
// ══════════════════════════════════════════════════════════════════════════════
function Checkin({s, save, toast}) {
  const [dv, setDv] = useState('');
  const [sv, setSv] = useState('');
  const [yv, setYv] = useState('');
  const [cv, setCv] = useState('');
  const [spendAmt, setSpendAmt] = useState('');
  const [spendNote, setSpendNote] = useState('');
  const [busy, setBusy] = useState(false);

  const hasBalance = dv!==''||sv!==''||yv!==''||cv!=='';
  const hasSpend   = spendAmt!=='' && Number(spendAmt)>0;

  // Predicted balance = opening − paid fixed − all debit var spent so far
  const predicted = predictedDebit(s);
  // When user enters new debit balance, difference from predicted = implied variable spend this session
  const newDebitBal   = dv !== '' ? Number(dv) : null;
  const impliedSpend  = newDebitBal !== null ? Math.max(0, predicted - newDebitBal) : null;
  const impliedDeposit= newDebitBal !== null ? Math.max(0, newDebitBal - predicted) : null;

  // Live preview for the result card
  const preview = useMemo(() => ({
    ...s,
    accounts: {
      debit: {
        opening_balance: s.accounts.debit.opening_balance,
        balance: dv!=='' ? Number(dv) : s.accounts.debit.balance,
      },
      sbi: {...s.accounts.sbi, available: sv!=='' ? Number(sv) : s.accounts.sbi.available},
      yes: {...s.accounts.yes, available: yv!=='' ? Number(yv) : s.accounts.yes.available},
    },
    cash: cv!=='' ? Number(cv) : (s.cash||0),
  }), [dv,sv,yv,cv,s]);

  const wfPrev = waterfall(preview);
  const wfCurr = waterfall(s);

  async function doSaveBalance() {
    if (!hasBalance) return;
    setBusy(true);
    const now = new Date().toISOString();

    // If debit balance changed and implied spend > 0, auto-add to spend log
    let newLog = [...(s.debit_spend_log||[])];
    if (dv !== '' && impliedSpend > 0) {
      newLog.push({amount: impliedSpend, note:'Auto: balance drop', ts: now});
    }

    const ns = {
      ...s,
      cash: cv!=='' ? Number(cv) : (s.cash||0),
      updated_at: now,
      debit_spend_log: newLog,
      accounts: {
        debit: {
          opening_balance: s.accounts.debit.opening_balance,
          balance: dv!=='' ? Number(dv) : s.accounts.debit.balance,
        },
        sbi: {...s.accounts.sbi, available: sv!=='' ? Number(sv) : s.accounts.sbi.available},
        yes: {...s.accounts.yes, available: yv!=='' ? Number(yv) : s.accounts.yes.available},
      },
    };
    await save(ns);
    toast('Saved ✓');
    setDv(''); setSv(''); setYv(''); setCv('');
    setBusy(false);
  }

  async function doAddSpend() {
    if (!hasSpend) return;
    setBusy(true);
    const now = new Date().toISOString();
    const entry = {amount:Number(spendAmt), note:spendNote||'Debit spend', ts:now};
    const ns = {
      ...s,
      updated_at: now,
      debit_spend_log: [...(s.debit_spend_log||[]), entry],
    };
    await save(ns);
    toast('Spend logged ✓');
    setSpendAmt(''); setSpendNote('');
    setBusy(false);
  }

  const sbiB = sbiSpent(preview);
  const yesB = yesSpent(preview);

  return (
    <div className="page">
      <div style={{fontSize:'1.05rem',fontWeight:700,padding:'.5rem 0 .05rem'}}>Check-In</div>
      <div style={{fontSize:'.7rem',color:'var(--m2)',marginBottom:'1rem',fontFamily:'var(--mono)'}}>Enter only what changed today</div>

      {/* Balance update */}
      <div className="card mb">
        <div className="mb">
          <div className="il">🏦 Debit Balance</div>
          <div className="big-input-wrap">
            <span className="big-input-prefix">₹</span>
            <input className="big-inp" type="number" inputMode="numeric"
              placeholder={String(s.accounts.debit.balance)} value={dv} onChange={e=>setDv(e.target.value)}/>
          </div>
          {/* Sanity check */}
          <div className="sanity">
            <span className="sanity-lbl">Predicted (opening − paid fixed − var spent)</span>
            <span className="sanity-val">{fmt(predicted)}</span>
          </div>
          {impliedSpend!==null && impliedSpend>0 && (
            <div style={{fontSize:'.7rem',color:'var(--red)',fontFamily:'var(--mono)',marginTop:4}}>
              ↓ {fmt(impliedSpend)} gap → will auto-log as debit variable spend
            </div>
          )}
          {impliedDeposit!==null && impliedDeposit>0 && (
            <div style={{fontSize:'.7rem',color:'var(--grn)',fontFamily:'var(--mono)',marginTop:4}}>
              ↑ {fmt(impliedDeposit)} above predicted (deposit or income received)
            </div>
          )}
        </div>
        <hr/>
        <div className="mb">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
            <div className="il" style={{marginBottom:0}}>💳 SBI Available</div>
            <span style={{fontSize:'.62rem',color:'var(--m2)',fontFamily:'var(--mono)'}}>limit {fmt(s.accounts.sbi.limit)}</span>
          </div>
          <div className="big-input-wrap">
            <span className="big-input-prefix">₹</span>
            <input className="big-inp" type="number" inputMode="numeric"
              placeholder={String(s.accounts.sbi.available)} value={sv} onChange={e=>setSv(e.target.value)}/>
          </div>
          {sbiB>0 && <div style={{marginTop:3,fontSize:'.7rem',color:'var(--amb)',fontFamily:'var(--mono)'}}>Bill: {fmt(sbiB)}</div>}
        </div>
        <hr/>
        <div className="mb">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
            <div className="il" style={{marginBottom:0}}>💳 YES Available</div>
            <span style={{fontSize:'.62rem',color:'var(--m2)',fontFamily:'var(--mono)'}}>limit {fmt(s.accounts.yes.limit)}</span>
          </div>
          <div className="big-input-wrap">
            <span className="big-input-prefix">₹</span>
            <input className="big-inp" type="number" inputMode="numeric"
              placeholder={String(s.accounts.yes.available)} value={yv} onChange={e=>setYv(e.target.value)}/>
          </div>
          {yesB>0 && <div style={{marginTop:3,fontSize:'.7rem',color:'var(--amb)',fontFamily:'var(--mono)'}}>Bill: {fmt(yesB)}</div>}
        </div>
        <hr/>
        <div>
          <div className="il">💵 Cash on Hand</div>
          <div className="big-input-wrap">
            <span className="big-input-prefix">₹</span>
            <input className="big-inp" type="number" inputMode="numeric"
              placeholder={String(s.cash||0)} value={cv} onChange={e=>setCv(e.target.value)}/>
          </div>
        </div>
      </div>

      {/* Live result */}
      {hasBalance && (
        <>
          <div className="sh">Result after save</div>
          <div className="card mb" style={{background:wfPrev.short>0?'var(--red-bg)':'var(--grn-bg)',borderColor:wfPrev.short>0?'var(--red-bd)':'var(--grn-bd)'}}>
            <div style={{fontSize:'.6rem',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:wfPrev.short>0?'var(--red)':'var(--grn)'}}>
              {wfPrev.short>0 ? 'Short by' : 'Surplus'}
            </div>
            <div style={{fontFamily:'var(--mono)',fontSize:'1.6rem',fontWeight:700,color:wfPrev.short>0?'var(--red)':'var(--grn)',lineHeight:1,margin:'.15rem 0 .5rem'}}>
              {fmt(wfPrev.short>0 ? wfPrev.short : wfPrev.surplus)}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}>
              <div className="hrow"><span className="hlbl">Credit bills</span><span className="hval" style={{color:'var(--amb)'}}>{fmt(wfPrev.creditBill)}</span></div>
              <div className="hrow"><span className="hlbl">Freely spendable</span><span className="hval">{fmt(wfPrev.afterSav)}</span></div>
              <div className="hrow"><span className="hlbl">Debit var left</span><span className="hval">{fmt(wfPrev.dVarLeft)}</span></div>
            </div>
          </div>
        </>
      )}

      <button className="btn bp mb" onClick={doSaveBalance} disabled={busy||!hasBalance}>
        {busy ? 'Saving…' : hasBalance ? '✓ Save Balances' : 'Enter a balance above'}
      </button>

      {/* Manual debit spend log */}
      <div className="sh">Log Debit Variable Spend</div>
      <div className="note inf mb">These are cash/debit purchases not covered by credit cards</div>
      <div className="card mb">
        <div className="mb">
          <div className="il">Amount</div>
          <div className="big-input-wrap">
            <span className="big-input-prefix">₹</span>
            <input className="big-inp" type="number" inputMode="numeric" placeholder="0" value={spendAmt} onChange={e=>setSpendAmt(e.target.value)}/>
          </div>
        </div>
        <div>
          <div className="il">Note (optional)</div>
          <input type="text" placeholder="e.g. Petrol, Auto, etc." value={spendNote} onChange={e=>setSpendNote(e.target.value)}/>
        </div>
      </div>
      <button className="btn bp mb" onClick={doAddSpend} disabled={busy||!hasSpend}>
        {busy ? 'Saving…' : '+ Log Spend'}
      </button>

      {/* Spend log */}
      {s.debit_spend_log && s.debit_spend_log.length > 0 && (
        <>
          <div className="sh">Debit Spend History</div>
          <DebitSpendLog s={s} save={save} toast={toast}/>
        </>
      )}
    </div>
  );
}

// ── Debit Spend Log ───────────────────────────────────────────────────────────
function DebitSpendLog({s, save, toast}) {
  const sorted = useMemo(() =>
    [...(s.debit_spend_log||[])].sort((a,b)=>new Date(b.ts)-new Date(a.ts))
  , [s.debit_spend_log]);

  function remove(ts) {
    const newLog = s.debit_spend_log.filter(e=>e.ts!==ts);
    save({...s, debit_spend_log:newLog});
    toast('Entry removed');
  }

  const total = debitVarSpent(s);
  const dVarBud = s.variable.filter(v=>v.card==='Debit').reduce((a,v)=>a+v.budget,0);

  return (
    <div className="wf">
      {sorted.map(e=>(
        <div key={e.ts} className="log-entry">
          <div>
            <div style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:'.85rem',color:'var(--red)'}}>−{fmt(e.amount)}</div>
            <div className="log-note">{e.note}</div>
            <div className="log-time">{fmtTime(e.ts)}</div>
          </div>
          <button className="bdng" onClick={()=>remove(e.ts)}>✕</button>
        </div>
      ))}
      <div style={{padding:'.55rem .9rem',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--s2)',borderTop:'1px solid var(--bd)'}}>
        <span style={{fontSize:'.68rem',color:'var(--m1)',fontWeight:600}}>Total debit spent</span>
        <span style={{fontFamily:'var(--mono)',fontSize:'.76rem',fontWeight:700,color:total>dVarBud?'var(--red)':'var(--tx)'}}>{fmt(total)} / {fmt(dVarBud)}</span>
      </div>
    </div>
  );
}

// EXPENSES
// ══════════════════════════════════════════════════════════════════════════════
function Expenses({s, save, toast}) {
  const [tab, setTab] = useState('fixed');
  const tvb = totVarBud(s);
  const tvs = totVarSpent(s);

  // Variable spend distributed by card proportionally
  const varWithSpent = useMemo(() => {
    function distByRatio(amount, cats) {
      const tot = cats.reduce((a,c)=>a+c.budget,0);
      if (!tot) return cats.map(c=>({...c, spent:0}));
      return cats.map(c=>({...c, spent:Math.round(amount*c.budget/tot)}));
    }
    return [
      ...distByRatio(sbiSpent(s),      s.variable.filter(v=>v.card==='SBI')),
      ...distByRatio(yesSpent(s),      s.variable.filter(v=>v.card==='YES')),
      ...distByRatio(debitVarSpent(s), s.variable.filter(v=>v.card==='Debit')),
    ];
  }, [s]);

  return (
    <div className="page">
      <div style={{fontSize:'1.05rem',fontWeight:700,padding:'.5rem 0 .75rem'}}>Expenses</div>
      <div className="tab-bar">
        {['fixed','variable'].map(t=><button key={t} className={`tab ${tab===t?'on':''}`} onClick={()=>setTab(t)}>{t}</button>)}
      </div>

      {tab==='fixed' && (
        <div>
          {unpaidFixedAmt(s)>0
            ? <div className="note wn">🔔 {fmt(unpaidFixedAmt(s))} still to pay (from debit)</div>
            : <div className="note gd">✓ All fixed expenses paid</div>
          }
          <div className="card">
            {s.fixed.map((f,i) => (
              <div key={i} className="er">
                <div className="eh">
                  <div className="en">
                    <span style={{fontSize:'.7rem'}}>{f.paid?'🟢':'⚪'}</span> {f.category}
                    <span style={{fontFamily:'var(--mono)',fontSize:'.72rem',color:'var(--m1)',fontWeight:500}}>{fmt(f.budget)}</span>
                  </div>
                  <Tog v={f.paid} onChange={v=>{
                    const fx=s.fixed.map((x,j)=>j===i?{...x,paid:v}:x);
                    save({...s,fixed:fx});
                    toast(v ? f.category+' marked paid' : f.category+' unmarked');
                  }}/>
                </div>
                <Bar sp={f.paid?f.budget:0} bud={f.budget}/>
              </div>
            ))}
          </div>
          <div style={{marginTop:'.5rem',padding:'.5rem .9rem',background:'var(--s2)',borderRadius:var(--rs),border:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'.72rem',color:'var(--m1)',fontWeight:500}}>Total fixed budget</span>
            <span style={{fontFamily:'var(--mono)',fontSize:'.76rem',fontWeight:700}}>{fmt(s.fixed.reduce((a,f)=>a+f.budget,0))}</span>
          </div>
        </div>
      )}

      {tab==='variable' && (
        <div>
          <div className="card mb">
            <div className="sl">Variable Remaining</div>
            <div className="sv" style={{color:tvb-tvs<0?'var(--red)':'var(--tx)'}}>{fmt(tvb-tvs)}</div>
            <div className="ss">{fmt(Math.round((tvb-tvs)/wLeft))}/wk · {wLeft} wks left</div>
          </div>
          <div className="note inf" style={{marginBottom:'.75rem'}}>
            SBI {fmt(sbiSpent(s))} · YES {fmt(yesSpent(s))} · Debit {fmt(debitVarSpent(s))}
          </div>
          <div className="card">
            {varWithSpent.map((v,i) => {
              const rem = v.budget - v.spent;
              return (
                <div key={i} className="er">
                  <div className="eh">
                    <div className="en">
                      {v.category}
                      <span className={`chip ${v.card==='SBI'?'cs_':v.card==='YES'?'cy':'cd'}`}>{v.card}</span>
                    </div>
                    <span style={{fontFamily:'var(--mono)',fontSize:'.72rem',color:rem>=0?'var(--grn)':'var(--red)',fontWeight:600}}>
                      {rem>=0 ? fmt(rem)+' left' : fmt(-rem)+' over'}
                    </span>
                  </div>
                  <Bar sp={v.spent} bud={v.budget}/>
                  <div style={{marginTop:3,fontSize:'.68rem',color:'var(--m2)',fontFamily:'var(--mono)'}}>budget {fmt(v.budget)}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SAVINGS & DEBTS
// ══════════════════════════════════════════════════════════════════════════════
function SavingsDebts({s, save, toast}) {
  return (
    <div className="page">
      <div style={{fontSize:'1.05rem',fontWeight:700,padding:'.5rem 0 .75rem'}}>Savings & Debts</div>

      <div className="sh">Savings</div>
      {s.savings.done
        ? <div className="note gd mb">✓ {fmt(s.savings.budget)} transferred</div>
        : <div className="note wn mb">⏳ {fmt(s.savings.budget)} pending transfer</div>
      }
      <div className="card mb">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:600,fontSize:'.88rem'}}>Monthly Savings</div>
            <div style={{fontSize:'.72rem',color:'var(--m2)',fontFamily:'var(--mono)',marginTop:2}}>{fmt(s.savings.budget)}</div>
          </div>
          <Tog v={s.savings.done} onChange={v=>save({...s,savings:{...s.savings,done:v}})}/>
        </div>
      </div>

      <div className="sh">Debts</div>
      {unpaidDebts(s)>0
        ? <div className="note wn mb">📋 {fmt(unpaidDebts(s))} outstanding</div>
        : <div className="note gd mb">✓ All debts settled</div>
      }
      <div className="gap mb">
        {s.debts.map((d,i) => (
          <div key={i} className="card">
            <div className="row">
              <div className="f1 gap">
                <input type="text" value={d.name} placeholder="Name"
                  onChange={e=>{const dts=s.debts.map((x,j)=>j===i?{...x,name:e.target.value}:x);save({...s,debts:dts})}}/>
                <input type="number" value={d.amount} inputMode="numeric"
                  onChange={e=>{const dts=s.debts.map((x,j)=>j===i?{...x,amount:Number(e.target.value)}:x);save({...s,debts:dts})}}/>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                <Tog v={d.paid||false} onChange={v=>{const dts=s.debts.map((x,j)=>j===i?{...x,paid:v}:x);save({...s,debts:dts})}}/>
                <span style={{fontSize:'.58rem',color:'var(--m2)'}}>{d.paid?'paid':'unpaid'}</span>
                <button className="bdng" onClick={()=>save({...s,debts:s.debts.filter((_,j)=>j!==i)})}>✕</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      <button className="btn bs mb" onClick={()=>save({...s,debts:[...s.debts,{name:'',amount:0,paid:false}]})}>＋ Add Debt</button>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════════════════════
function Settings({s, save, toast}) {
  return (
    <div className="page">
      <div style={{fontSize:'1.05rem',fontWeight:700,padding:'.5rem 0 .75rem'}}>Settings</div>

      <div className="sh">Income</div>
      <div className="card mb">
        <div className="il">Monthly Income</div>
        <input type="number" value={s.base_budget} inputMode="numeric"
          onChange={e=>save({...s,base_budget:Number(e.target.value)})}/>
      </div>

      <div className="sh">Additional Income</div>
      <div className="gap mb">
        {s.additional_income.map((inc,i) => (
          <div key={i} className="card">
            <div className="row">
              <div className="f1 gap">
                <input type="text" placeholder="Source" value={inc.source}
                  onChange={e=>{const ai=s.additional_income.map((x,j)=>j===i?{...x,source:e.target.value}:x);save({...s,additional_income:ai})}}/>
                <input type="number" placeholder="Amount" value={inc.amount} inputMode="numeric"
                  onChange={e=>{const ai=s.additional_income.map((x,j)=>j===i?{...x,amount:Number(e.target.value)}:x);save({...s,additional_income:ai})}}/>
              </div>
              <button className="bdng" onClick={()=>save({...s,additional_income:s.additional_income.filter((_,j)=>j!==i)})}>✕</button>
            </div>
          </div>
        ))}
      </div>
      <button className="btn bs mb" onClick={()=>save({...s,additional_income:[...s.additional_income,{source:'',amount:0}]})}>＋ Add Income</button>

      <div className="sh">Cashback</div>
      <div className="note inf mb">🎁 Cashback is auto-deducted from your card bill</div>
      <div className="card gap mb">
        <div><div className="il">SBI Cashback</div>
          <input type="number" value={s.accounts.sbi.cashback||0} inputMode="numeric"
            onChange={e=>save({...s,accounts:{...s.accounts,sbi:{...s.accounts.sbi,cashback:Number(e.target.value)}}})}/>
        </div>
        <div><div className="il">YES Cashback</div>
          <input type="number" value={s.accounts.yes.cashback||0} inputMode="numeric"
            onChange={e=>save({...s,accounts:{...s.accounts,yes:{...s.accounts.yes,cashback:Number(e.target.value)}}})}/>
        </div>
      </div>

      <div className="sh">Savings Target</div>
      <div className="card mb">
        <div className="il">Monthly Savings</div>
        <input type="number" value={s.savings.budget} inputMode="numeric"
          onChange={e=>save({...s,savings:{...s.savings,budget:Number(e.target.value)}})}/>
      </div>

      <div className="sh">Credit Limits</div>
      <div className="card gap mb">
        <div><div className="il">SBI Limit</div>
          <input type="number" value={s.accounts.sbi.limit} inputMode="numeric"
            onChange={e=>save({...s,accounts:{...s.accounts,sbi:{...s.accounts.sbi,limit:Number(e.target.value)}}})}/>
        </div>
        <div><div className="il">YES Limit</div>
          <input type="number" value={s.accounts.yes.limit} inputMode="numeric"
            onChange={e=>save({...s,accounts:{...s.accounts,yes:{...s.accounts.yes,limit:Number(e.target.value)}}})}/>
        </div>
      </div>

      <div className="sh">Opening Balance</div>
      <div className="note inf mb">📌 Set once at month start — used to calculate predicted balance</div>
      <div className="card mb">
        <div className="il">Debit Opening Balance</div>
        <input type="number" value={s.accounts.debit.opening_balance} inputMode="numeric"
          onChange={e=>save({...s,accounts:{...s.accounts,debit:{...s.accounts.debit,opening_balance:Number(e.target.value)}}})}/>
      </div>

      <div className="sh">Month Reset</div>
      <div className="note wn mb">⚠ Resets fixed, savings, spend log, and credit available for new month</div>
      <button className="btn bs mb" onClick={()=>{
        if(!confirm('Start new month? This resets all tracking data.')) return;
        const ns = {...s,
          debit_spend_log: [],
          savings: {...s.savings, done:false},
          fixed: s.fixed.map(f=>({...f, paid:false})),
          debts: s.debts.map(d=>({...d, paid:false})),
          accounts: {
            debit: {opening_balance: s.accounts.debit.balance, balance: s.accounts.debit.balance},
            sbi: {...s.accounts.sbi, available:s.accounts.sbi.limit},
            yes: {...s.accounts.yes, available:s.accounts.yes.limit},
          },
          updated_at: new Date().toISOString(),
        };
        save(ns).then(()=>toast('New month started ✓'));
      }}>🔄 New Month Reset</button>

      <div className="sh" style={{color:'var(--red)'}}>Danger</div>
      <button className="btn mb" style={{background:'var(--red-bg)',color:'var(--red)',border:'1px solid var(--red-bd)'}}
        onClick={()=>{if(confirm('Reset ALL data to defaults?'))save(JSON.parse(JSON.stringify(DEFAULT))).then(()=>toast('Reset ✓'))}}>
        Reset to defaults
      </button>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [state, setState] = useState(null);
  const [page,  setPage]  = useState('checkin');
  const [tmsg,  setTmsg]  = useState('');
  const timer = useRef(null);

  function toast(msg) {
    setTmsg(msg);
    if (timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(()=>setTmsg(''), 2200);
  }

  function deepMerge(def, saved) {
    const r = {...def};
    for (const k in saved) {
      if (k in r && typeof r[k]==='object' && !Array.isArray(r[k]) && r[k]!==null && saved[k]!==null)
        r[k] = deepMerge(r[k], saved[k]);
      else r[k] = saved[k];
    }
    return r;
  }

  useEffect(()=>{
    (async()=>{
      const {data} = await db.from('budget_state').select('data').eq('id','main').single();
      if (data?.data) {
        const merged = deepMerge(JSON.parse(JSON.stringify(DEFAULT)), data.data);
        setState(migrate(merged));
      } else {
        setState(JSON.parse(JSON.stringify(DEFAULT)));
      }
    })();
  },[]);

  const save = useCallback(async ns => {
    setState(ns);
    await db.from('budget_state').upsert({id:'main', data:ns, updated_at:new Date().toISOString()});
  },[]);

  if (!state) return (
    <div className="loading">
      <div className="spinner"/>
      <div style={{fontSize:'.72rem',color:'var(--m2)',fontFamily:'var(--mono)'}}>Loading…</div>
    </div>
  );

  const nav = [
    {id:'overview', label:'Overview', icon:<><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>},
    {id:'checkin',  label:'Check-In', icon:<><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></>},
    {id:'expenses', label:'Expenses', icon:<><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>},
    {id:'savings',  label:'Debts',    icon:<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>},
    {id:'settings', label:'Settings', icon:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>},
  ];

  return (
    <>
      {page==='overview' && <Overview s={state}/>}
      {page==='checkin'  && <Checkin  s={state} save={save} toast={toast}/>}
      {page==='expenses' && <Expenses s={state} save={save} toast={toast}/>}
      {page==='savings'  && <SavingsDebts s={state} save={save} toast={toast}/>}
      {page==='settings' && <Settings s={state} save={save} toast={toast}/>}
      <nav className="nav">
        {nav.map(n=>(
          <button key={n.id} className={`nb ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}>
            <svg viewBox="0 0 24 24">{n.icon}</svg>
            {n.label}
          </button>
        ))}
      </nav>
      <Toast msg={tmsg}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
